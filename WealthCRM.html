function dpdpaConsentGiven(c) {
  return !!(c.dpdpaConsent && c.dpdpaConsent.date);
}

function retentionExpiry(c) {
  if (c.status === 'active' || c.status === 'review') return 'Active — retain indefinitely';
  const base = c.lastContact || c.agDate || c.rpDate || TODAY;
  const d = new Date(base);
  d.setFullYear(d.getFullYear() + 5);
  return d.toISOString().slice(0,10);
}

function retentionDaysLeft(c) {
  if (c.status === 'active' || c.status === 'review') return null;
  const exp = retentionExpiry(c);
  if (exp.startsWith('Active')) return null;
  return daysTo(exp);
}

async function encryptData(plaintext, password) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['encrypt']
  );
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(plaintext));
  const out = new Uint8Array(16+12+ct.byteLength);
  out.set(salt,0); out.set(iv,16); out.set(new Uint8Array(ct),28);
  return btoa(String.fromCharCode(...out));
}

async function decryptData(b64, password) {
  const enc = new TextEncoder();
  if (!b64 || typeof b64 !== 'string') throw new Error('Invalid encrypted data'); const bytes = Uint8Array.from(atob(b64.replace(/[^A-Za-z0-9+/=]/g,'')), ch => ch.charCodeAt(0));
  const salt = bytes.slice(0,16), iv = bytes.slice(16,28), ct = bytes.slice(28);
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return new TextDecoder().decode(pt);
}

async function downloadEncryptedBackup() {
  const pwd = prompt('Set a password for this encrypted backup:\n(You must use this password to restore it)');
  if (!pwd) return;
  const pwd2 = prompt('Confirm password:');
  if (pwd !== pwd2) { toast('Passwords do not match','err'); return; }
  if (pwd.length < 6) { toast('Password must be at least 6 characters','err'); return; }
  try {
    const encrypted = await encryptData(JSON.stringify(buildBackupPayload(),null,2), pwd);
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify({encrypted:true,v:1,data:encrypted}));
    a.download = _APP_LABEL + '_ENCRYPTED_' + TODAY + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Encrypted backup downloaded (AES-256) ✓');
    log('Encrypted backup downloaded');
  } catch(e) { toast('Encryption error: '+e.message,'err'); }
}

async function restoreEncryptedBackup() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const obj = JSON.parse(await file.text());
      if (!obj.encrypted) { dpRestore(); return; }
      const pwd = prompt('Enter password for this encrypted backup:');
      if (!pwd) return;
      const d = JSON.parse(await decryptData(obj.data, pwd));
      if (!d.clients) { toast('Invalid backup','err'); return; }
      if (!confirm('Restore from encrypted backup?\nDate: '+(d.exportedDate||'unknown')+'\nClients: '+(d.clients?.length||0))) return;
      if (d.clients) S.clients=d.clients;
      if (d.tasks) S.tasks=d.tasks;
      if (d.pipeline) S.pipeline=d.pipeline;
      if (d.actLog) S.actLog=d.actLog;
      S.nextId=Math.max(...(d.clients||[]).map(x=>x.id||0),...(d.tasks||[]).map(x=>x.id||0),S.nextId||1)+1;
      save(); toast('Restored: '+(d.clients?.length||0)+' clients loaded ✓');
      log('Encrypted backup restored from '+file.name); render();
    } catch(err) {
      toast(err.message.includes('decrypt')?'Wrong password':'Restore failed: '+err.message,'err');
    }
  };
  inp.click();
}

function archiveClient(id) {
  const c = S.clients.find(x=>x.id===id); if (!c) return;
  const exp = retentionExpiry(c);
  if (!confirm('Archive '+c.name+'?\n\nSEBI requires 5-year data retention after relationship ends.\nRetention until: '+exp)) return;
  c.status='cold'; c.archivedDate=TODAY; c.retentionExpiry=exp;
  save(); toast(c.name+' archived — retain records until '+exp);
  log('Client archived (SEBI 5yr retention): '+c.name); render();
}

function requestDataDeletion(id) {
  const c = S.clients.find(x=>x.id===id); if (!c) return;
  if (c.status==='active'||c.status==='review') { toast('Cannot delete active client — archive first','err'); return; }
  const dLeft = retentionDaysLeft(c);
  if (dLeft!==null&&dLeft>0) { toast('SEBI 5-year retention period has not expired yet. Eligible on: '+retentionExpiry(c),'err'); return; }
  if (!confirm('PERMANENTLY DELETE '+c.name+'?\n\nSEBI 5-year retention has expired.\nThis cannot be undone.')) return;
  S.actLog.unshift({ts:ts0(),msg:'DPDPA deletion: '+c.name+' (PAN: '+(c.pan||'N/A')+') — 5yr retention expired — deleted per DPDPA 2023'});
  S.clients=S.clients.filter(x=>x.id!==id);
  S.tasks=S.tasks.filter(t=>t.client!==c.name);
  save(); toast(c.name+' permanently deleted per DPDPA 2023 ✓');
  S.view=null; render();
}

function logDataBreach() {
  const desc = prompt('Describe the data breach or security incident:');

}

function importCommissionCSV() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.csv';
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.split('\n').filter(l=>l.trim());
      if (lines.length<2) { toast('CSV appears empty','err'); return; }
      const headers = lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
      const rows = lines.slice(1).map(line=>{
        const vals=line.split(',').map(v=>v.replace(/"/g,'').trim());
        const obj={}; headers.forEach((h,i)=>{obj[h]=vals[i]||''}); return obj;
      }).filter(r=>Object.values(r).some(v=>v));
      _commImportData=rows; S.sub.commImport='preview';
      toast(rows.length+' records loaded — review below'); log('Commission CSV loaded: '+rows.length+' rows from '+file.name); render();

    reader.readAsText(file);
  };
  inp.click();
}

}

        <tbody>${S.clients.map(c=>{const exp=retentionExpiry(c);const dLeft=retentionDaysLeft(c);const canDel=dLeft!==null&&dLeft<=0;return `<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 8px;font-weight:500;cursor:pointer" onclick="openC(${c.id})">${escapeHtml(c.name)}</td><td style="padding:6px 8px"><span class="bdg b-${c.status}">${c.status}</span></td><td style="padding:6px 8px;font-size:10px;color:${canDel?'var(--amber)':'var(--text3)'}">${exp}</td><td style="padding:6px 8px">${canDel?`<button class="btn bd bsm" onclick="requestDataDeletion(${c.id})"><i class="ti ti-trash"></i> Delete</button>`:c.status==='cold'?'<span style="font-size:10px;color:var(--text3)">Archived</span>':`<button class="btn bs bsm" onclick="archiveClient(${c.id})"><i class="ti ti-archive"></i> Archive</button>`}</td></tr>`}).join('')}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="sec">Trail commission import</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:9px">Download your commission CSV from <b>CAMS</b> (camsonline.com → Distributor Login → Commission Reports) or <b>MFCentral</b> (mfcentral.com → Distributor → Earnings). Import it here to match records to clients by folio number or name.</div>
      <button class="btn bp bsm" onclick="importCommissionCSV()"><i class="ti ti-upload"></i> Import commission CSV</button>
      ${_commImportData.length?`<div style="margin-top:10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px"><div style="font-size:12px;font-weight:500;margin-bottom:7px">${_commImportData.length} records ready</div><div style="overflow-x:auto;max-height:120px;font-size:10px;margin-bottom:8px"><table style="width:100%;border-collapse:collapse"><thead><tr>${Object.keys(_commImportData[0]).slice(0,5).map(h=>`<th style="padding:3px 6px;text-align:left;color:var(--text3);border-bottom:1px solid var(--border)">${h}</th>`).join('')}</tr></thead><tbody>${_commImportData.slice(0,5).map(r=>`<tr>${Object.values(r).slice(0,5).map(v=>`<td style="padding:3px 6px;border-bottom:1px solid var(--border);color:var(--text2)">${v}</td>`).join('')}</tr>`).join('')}</tbody></table></div><div style="display:flex;gap:7px"><button class="btn bp bsm" onclick="confirmCommImport()"><i class="ti ti-check"></i> Confirm import</button><button class="btn bs bsm" onclick="_commImportData=[];render()"><i class="ti ti-x"></i> Cancel</button></div></div>`:''}
      ${S.clients.some(c=>c.commissions?.length)?`<div class="sec" style="margin-top:12px">Imported commission records</div>${S.clients.filter(c=>c.commissions?.length).map(c=>`<div class="row" onclick="openC(${c.id})"><div class="av ${avcl(c.color)}">${escapeHtml(ini(c.name))}</div><div style="flex:1"><div class="rn">${escapeHtml(c.name)}</div><div class="rs">${c.commissions.length} records · Total: ${fmt(c.commissions.reduce((a,x)=>a+(+x.amount||0),0))}</div></div></div>`).join('')}`:''}
    </div>
  </div></div>`;
}

const _sdOrigBP = buildPage;
buildPage = function() {
  if (S.tab==='sebi-data') return pgSebiDataPage();
  return _sdOrigBP();
};

var _sdTBInt = setInterval(()=>{
  if (typeof TB_INFO!=='undefined') {
    TB_INFO['sebi-data']={t:'SEBI / DPDPA Data Compliance',s:'Consent · Encrypted backup · 5yr retention · Commission import · Breach log'};
    clearInterval(_sdTBInt);
  }
},100);

var _sdObs = new MutationObserver(()=>{
  const nav=document.getElementById('sb-nav'); if (!nav) return;
  if (document.getElementById('sd-nav-item')) {
    document.getElementById('sd-nav-item').className='ni'+(S.tab==='sebi-data'?' on':''); return;
  }
  const el=document.createElement('div'); el.id='sd-nav-item';
  el.className='ni'+(S.tab==='sebi-data'?' on':'');
  el.innerHTML='<i class="ti ti-shield-lock"></i><span>SEBI/DPDPA Data</span>';
  el.onclick=()=>{S.tab='sebi-data';S.view=null;S.modal=null;render();};
  const allNI=Array.from(nav.querySelectorAll('.ni'));
  const comp=allNI.find(x=>x.textContent.includes('Compliance Tracker')||x.textContent.includes('AMFI Compliance'));
  if (comp) comp.parentNode.insertBefore(el,comp.nextSibling); else nav.appendChild(el);
});

window.addEventListener('load',function(){var nav=document.getElementById('sb-nav');if(nav&&typeof _sdObs!=='undefined')_sdObs.observe(nav,{childList:true,subtree:false});});

// ── INPUT VALIDATION ─────────────────────────────────────────────────────────
function validatePAN(pan) {
  if (!pan) return true;
  return /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/.test(pan.toUpperCase());
}
function validateMobile(mobile, resStatus) {
  if (!mobile) return true;
  const digits = mobile.replace(/\D/g,'');
  if ((resStatus||'RI') === 'NRI') return digits.length >= 8 && digits.length <= 15;
  return digits.length === 10;
}
function validateEmail(email) {
  if (!email) return true;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
function validateClientForm() {
  const errors = [];
  const name = v('f-n');
  const pan = v('f-pa').toUpperCase();
  const mobile = v('f-ph');
  const email = v('f-em');
  const aum = num('f-au');
  const sip = num('f-si');
  const sipDue = num('f-sd');
  const dob = v('f-db');
  const resStatus = document.getElementById('f-rs')?.value || 'RI';
  if (!name) errors.push('Full name is required');
  if (pan && !validatePAN(pan)) errors.push('PAN must be in format AAAAA9999A (5 letters, 4 digits, 1 letter)');
  if (mobile && !validateMobile(mobile, resStatus)) {
    if (resStatus === 'NRI') errors.push('NRI mobile number must be 8–15 digits');
    else errors.push('Mobile number must be exactly 10 digits');
  }
  if (email && !validateEmail(email)) errors.push('Invalid email address format');
  if (aum < 0) errors.push('AUM cannot be negative');
  if (sip < 0) errors.push('Monthly SIP cannot be negative');
  if (sipDue && (sipDue < 1 || sipDue > 28)) errors.push('SIP due date must be between 1 and 28');
  if (dob && new Date(dob) > new Date()) errors.push('Date of birth cannot be in the future');
  return errors;
}

function sbLoadClient(cid) {
  const c = S.clients.find(x=>x.id==cid);
  const el = document.getElementById('sb-sip-list'); if(!el) return;
  if(!c){ el.innerHTML=''; return; }
  const sips = c.sips||[];
  el.innerHTML = sips.length ? sips.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <input value="${escapeHtml(s.fund||'')}" placeholder="Fund name" style="margin-bottom:4px" oninput="sbUpdateSIP(${c.id},${i},'fund',this.value)">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px">
          <input type="number" value="${s.amount||''}" placeholder="Amount (₹)" oninput="sbUpdateSIP(${c.id},${i},'amount',+this.value)">
          <input type="number" value="${s.date||''}" placeholder="Due date (1-28)" min="1" max="28" oninput="sbUpdateSIP(${c.id},${i},'date',+this.value)">
          <input value="${escapeHtml(s.folio||'')}" placeholder="Folio (AMC)" oninput="sbUpdateSIP(${c.id},${i},'folio',this.value)">
        </div>
      </div>
      <button class="btn bd bicon bsm" onclick="sbDelSIP(${c.id},${i})"><i class="ti ti-trash" style="font-size:13px"></i></button>
    </div>`).join('') : '<div style="font-size:11px;color:var(--text3);padding:8px 0">No SIPs recorded for this client yet.</div>';
}
function sbUpdateSIP(cid, idx, field, val) {
  const c = S.clients.find(x=>x.id==cid); if(!c||!c.sips||!c.sips[idx]) return;
  c.sips[idx][field] = val;
  // Recalculate total SIP
  c.sip = c.sips.reduce((a,s)=>a+(+s.amount||0),0);
  save(); log('Updated SIP for '+c.name);
}
function sbDelSIP(cid, idx) {
  const c = S.clients.find(x=>x.id==cid); if(!c||!c.sips) return;
  if(!confirm('Remove this SIP record?')) return;
  c.sips.splice(idx,1);
  c.sip = c.sips.reduce((a,s)=>a+(+s.amount||0),0);
  save(); toast('SIP removed');
  sbLoadClient(cid); render();
}
function sbAddSIP(cid) {
  const selEl = document.getElementById('sb-client');
  const id = cid||selEl?.value;
  const c = S.clients.find(x=>x.id==id);
  if(!c){ toast('Select a client first','err'); return; }
  if(!c.sips) c.sips=[];
  c.sips.push({fund:'',amount:0,date:1,folio:''});
  save(); sbLoadClient(c.id);
}

function insAdd() {
  const cid = document.getElementById('ins-client')?.value;
  const c = S.clients.find(x=>x.id==cid);
  if(!c){ toast('Select a client first','err'); return; }
  const cover = +document.getElementById('ins-cover')?.value||0;
  const prem  = +document.getElementById('ins-prem')?.value||0;
  const renew = document.getElementById('ins-renew')?.value||'';
  const ins   = document.getElementById('ins-insurer')?.value||'';
  const type  = document.getElementById('ins-type')?.value||'Term';
  const polno = document.getElementById('ins-polno')?.value||'';
  if(!cover && !prem){ toast('Enter at least cover amount or premium','err'); return; }
  if(!c.insurance) c.insurance=[];
  c.insurance.push({type,insurer:ins,cover,premium:prem,renewal:renew,policyNo:polno});
  save(); toast('Policy added for '+c.name+' ✓'); log('Insurance added: '+type+' for '+c.name);
  render();
}

function clearAllData() {
  if (!confirm('This will permanently delete ALL clients, tasks, pipeline, SIPs, and activity logs from this device.\n\nThis cannot be undone. Make sure you have a backup first.\n\nType OK to confirm.')) return;
  const confirmed = prompt('Type DELETE to confirm complete data wipe:');
  if (confirmed !== 'DELETE') { toast('Cancelled — nothing deleted', 'info'); return; }
  localStorage.removeItem('mfd_v2');
  S.clients=[]; S.tasks=[]; S.actLog=[]; S.pipeline=S.pipeline?[]:undefined;
  S.nextId=1; S.view=null; S.modal=null; S.tab='dashboard';
  save(); toast('All data cleared ✓'); log('Data wipe performed');
  render();
}

function snoozeComp(id, days) {
  if (!S.compSnooze) S.compSnooze = {};
  const until = new Date(TODAY);
  until.setDate(until.getDate() + (days||7));
  S.compSnooze[id] = until.toISOString().slice(0,10);
  save(); toast('Snoozed for '+days+' days'); log('Compliance item snoozed: '+id);
  render();
}
function unsnoozeComp(id) {
  if (S.compSnooze) delete S.compSnooze[id];
  save(); toast('Snooze cleared'); render();
}
function compIsSnoozed(id) {
  if (!S.compSnooze || !S.compSnooze[id]) return false;
  return S.compSnooze[id] >= TODAY;
}
function compTaskExists(taskTitle) {
  return S.tasks.some(t => !t.done && t.title && t.title.toLowerCase().includes((taskTitle||'').toLowerCase().slice(0,20)));
}
function compGoToTask(taskTitle) {
  const t = S.tasks.find(x => !x.done && x.title && x.title.toLowerCase().includes((taskTitle||'').toLowerCase().slice(0,20)));
  if (t) { S.tab='tasks'; render(); } else { toast('No open task found','info'); }
}

function markCompDone(id) {
  const label = buildChecks().find(c=>c.id===id)?.label || id;
  const date = prompt('Enter completion date (YYYY-MM-DD) or leave blank for today:', TODAY);
  if (date === null) return;
  const note = prompt('Optional: certificate number, ARN number, or reference note:', '');
  if (!S.compOverrides) S.compOverrides = {};
  S.compOverrides[id] = { date: date || TODAY, note: note || '', markedAt: TODAY };
  S.tasks.forEach(t => {
    const taskTitle = buildChecks().find(c=>c.id===id)?.taskTitle || '';
    if (!t.done && t.title && taskTitle && t.title.toLowerCase().includes(taskTitle.toLowerCase().slice(0,20))) {
      t.done = true;
    }
  });
  save();
  toast(label + ' marked as completed ✓');
  log('Compliance item marked done: ' + label + ' on ' + (date||TODAY) + (note?' ('+note+')':''));
  render();
}
function clearCompDone(id) {
  if (!confirm('Remove the completion override? This item will show as pending again.')) return;
  if (S.compOverrides) delete S.compOverrides[id];
  save(); toast('Override cleared'); render();
}
