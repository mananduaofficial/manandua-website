<div id="pgGate" style="position:fixed;inset:0;z-index:9999;background:#1d2e28;display:flex;align-items:center;justify-content:center;font-family:'Inter',system-ui,sans-serif;">
  <div style="background:#faf8f3;border-radius:12px;padding:40px 36px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.35);">
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:600;color:#1d2e28;margin-bottom:6px;">Private access</div>

    <input type="password" id="pgInput" placeholder="Password" style="width:100%;padding:10px 12px;border:1px solid #d8d0c0;border-radius:6px;font-size:14px;margin-bottom:10px;box-sizing:border-box;" autocomplete="off">
    <div id="pgError" style="display:none;color:#b0453a;font-size:12px;margin-bottom:10px;">Incorrect password. Try again.</div>
    <button id="pgSubmit" style="width:100%;background:#2a4038;color:#fff;border:none;border-radius:6px;padding:11px;font-size:13.5px;font-weight:500;cursor:pointer;">Unlock</button>
  </div>
</div>
<script>
(function() {
  var PG_HASH = 'b893829a909d5eb9d7f41870268e05e07cedb728c8bbc06e06cebfed0daa4174'; // sha-256 of the password — change by generating a new hash
  var gate = document.getElementById('pgGate');
  var input = document.getElementById('pgInput');
  var err = document.getElementById('pgError');
  var btn = document.getElementById('pgSubmit');

  if (sessionStorage.getItem('pg_unlocked') === 'yes') {
    gate.style.display = 'none';
  }

  function sha256Hex(str) {
    var enc = new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256', enc).then(function(buf) {
      return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    });
  }

  function tryUnlock() {
    sha256Hex(input.value).then(function(hash) {
      if (hash === PG_HASH) {
        sessionStorage.setItem('pg_unlocked', 'yes');
        gate.style.display = 'none';
      } else {
        err.style.display = 'block';
        input.value = '';
        input.focus();
      }
    });
  }

  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') tryUnlock(); });
  setTimeout(function() { input.focus(); }, 100);
})();
</script>

const TODAY=new Date().toISOString().slice(0,10);
const _APP_LABEL='Wealth_CRM';

  pipeline:[],
  tasks:[],
  actLog:[]

function ts0(){const n=new Date();return n.toISOString().slice(0,10)+' '+n.toTimeString().slice(0,5)}
function escapeHtml(str){
  if(str===undefined||str===null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmt(n){return '₹'+Number(n).toLocaleString('en-IN')}
function fmtL(n){if(n>=10000000)return '₹'+(n/10000000).toFixed(2)+'Cr';return '₹'+(n/100000).toFixed(1)+'L'}
function ini(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function avcl(c){return {b:'av-b',g:'av-g',a:'av-a',r:'av-r',p:'av-p',t:'av-t'}[c]||'av-p'}
function isOD(due){return due&&due<TODAY}
function daysTo(due){if(!due)return null;return Math.round((new Date(due)-new Date(TODAY))/864e5)}
function newCol(){return ['b','g','a','r','p','t'][S.nextId%6]}
function log(msg){S.actLog.unshift({ts:ts0(),msg});if(S.actLog.length>200)S.actLog.pop();save()}
function save(){try{localStorage.setItem('mfd_v2',JSON.stringify({clients:S.clients,pipeline:S.pipeline,tasks:S.tasks,actLog:S.actLog,nextId:S.nextId,compSnooze:S.compSnooze||{},compOverrides:S.compOverrides||{}}))}catch(e){}}
function load(){try{const d=localStorage.getItem('mfd_v2');if(d){const p=JSON.parse(d);['clients','pipeline','tasks','actLog','nextId','compSnooze','compOverrides'].forEach(k=>{if(p[k]!==undefined)S[k]=p[k]})}}catch(e){}}
function toast(msg,type='ok'){const el=document.getElementById('toast');document.getElementById('t-icon').className='ti ti-'+(type==='ok'?'check':type==='err'?'x':'info-circle');document.getElementById('t-msg').textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400)}
function rpExpired(c){if(!c.rpDate)return true;return(new Date(TODAY)-new Date(c.rpDate))/(864e5*365)>2}
function agExpired(c){if(!c.agDate)return true;return(new Date(TODAY)-new Date(c.agDate))/(864e5*365)>3}
function dueLabel(due,done){if(done)return 'done';const d=daysTo(due);if(d===null)return '—';if(d<0)return Math.abs(d)+'d overdue';if(d===0)return 'Today';if(d===1)return 'Tomorrow';return d+'d'}
function v(id){return(document.getElementById(id)?.value||'').trim()}
function num(id){return Number(document.getElementById(id)?.value)||0}
function gv(id){return document.getElementById(id)?.value||'0'}
function empty(msg,icon='ti-inbox'){return `<div style="text-align:center;padding:22px;color:var(--text3)"><i class="ti ${icon}" style="font-size:24px;display:block;margin-bottom:6px;opacity:.4"></i>${msg}</div>`}
function mc(label,val,sub,icon,col){return `<div class="mc"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div class="ml">${label}</div><i class="ti ${icon}" style="font-size:16px;color:${col};opacity:.7"></i></div><div class="mv">${val}</div><div class="ms">${sub}</div></div>`}
function trowHtml(t){const od=isOD(t.due)&&!t.done;return `<div class="tr"><div class="tck${t.done?' done':''}" onclick="toggleT(${t.id})">${t.done?'✓':''}</div><div style="flex:1;min-width:0"><div style="font-size:12px;color:${t.done?'var(--text3)':'var(--text)'}${t.done?';text-decoration:line-through':''};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(t.title)}</div><div style="font-size:10px;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap"><span class="bdg b-${t.type==='Compliance'?'rev':t.type==='Service'?'act':t.type==='Review'?'pu':t.type==='Follow-up'?'or':'cld'}">${escapeHtml(t.type)}</span>${t.client?`<span style="color:var(--text3)">${escapeHtml(t.client)}</span>`:''}<span style="color:${od?'var(--red)':'var(--text3)'}">${dueLabel(t.due,t.done)}</span></div></div><span class="bdg b-${t.priority}" style="flex-shrink:0">${escapeHtml(t.priority)}</span></div>`}

const NAV=[
  {g:'Overview',items:[{k:'dashboard',ic:'ti-layout-dashboard',l:'Dashboard'}]},
  {g:'Distribution CRM',items:[{k:'clients',ic:'ti-users',l:'Clients'},{k:'pipeline',ic:'ti-filter',l:'Pipeline'},{k:'leads',ic:'ti-chart-pie',l:'Lead Analytics'}]},
  {g:'Financial Planning',items:[{k:'sip-book',ic:'ti-refresh',l:'SIP Book'},{k:'insurance',ic:'ti-shield',l:'Insurance Tracker'}]},
  {g:'Work',items:[{k:'tasks',ic:'ti-checkbox',l:'Tasks'},{k:'calendar',ic:'ti-calendar',l:'Calendar'},{k:'communication',ic:'ti-message',l:'Communication Hub'}]},
  {g:'AMFI Compliance',items:[{k:'compliance',ic:'ti-shield-check',l:'AMFI Compliance'},{k:'documents',ic:'ti-files',l:'Document Register'},{k:'ilog',ic:'ti-clock-record',l:'Interaction Log'}]},
  {g:'Reports',items:[{k:'reports',ic:'ti-chart-bar',l:'Reports & Export'},{k:'activity',ic:'ti-clock',l:'Activity Log'}]},
];

function render(){renderSB();renderTB();document.getElementById('page').innerHTML=buildPage();renderModal()}
function renderSB(){
  const od=S.tasks.filter(t=>!t.done&&isOD(t.due)).length;
  document.getElementById('sb-nav').innerHTML=NAV.map(g=>`<div class="nav-g">${g.g}</div>${g.items.map(i=>`<div class="ni${S.tab===i.k?' on':''}" onclick="sw('${i.k}')"><i class="ti ${i.ic}"></i><span>${i.l}</span>${i.k==='tasks'&&od?`<span class="ni-badge">${od}</span>`:''}</div>`).join('')}`).join('');
}
const TB_INFO={dashboard:{t:'MFD Dashboard',s:'Mutual Fund Distribution Practice Overview'},clients:{t:'Distribution Clients',s:'Client relationships as AMFI-registered MFD'},pipeline:{t:'Pipeline',s:'Prospect tracking and SIP conversion'},leads:{t:'Lead Analytics',s:'Source performance and referral tracking'},['sip-book']:{t:'SIP Book',s:'All active SIPs — fund-wise and client-wise'},'insurance':{t:'Insurance Tracker',s:'Coverage gaps, renewals and recommendations'},tasks:{t:'Tasks & Follow-ups',s:'Action items sorted by priority'},calendar:{t:'Calendar',s:'Reviews, SIP due dates and compliance deadlines'},communication:{t:'Communication Hub',s:'12 MFD-specific email and WhatsApp templates'},compliance:{t:'AMFI Compliance Tracker',s:'MFD regulatory obligations under AMFI/SEBI'},documents:{t:'Document Register',s:'KYC, risk profiles, MFD agreements — client-wise'},ilog:{t:'Interaction Log',s:'Client interaction records'},reports:{t:'Reports & Export',s:'AUM, SIP book analytics and export'},activity:{t:'Activity Log',s:'Full audit trail'},'ce-export':{t:'Custom Export',s:'Select fields and clients to export — CSV or Excel'}};
const TB_ACTIONS={clients:`<button class="btn bp bsm" onclick="openM('addClient')"><i class="ti ti-plus"></i> Add client</button>`,pipeline:`<button class="btn bp bsm" onclick="openM('addPipe')"><i class="ti ti-plus"></i> Add prospect</button>`,tasks:`<button class="btn bp bsm" onclick="openM('addTask','')"><i class="ti ti-plus"></i> Add task</button>`,reports:`<button class="btn bs bsm" onclick="expCSV()"><i class="ti ti-download"></i> Export</button><button class="btn bs bsm" onclick="backup()"><i class="ti ti-database-export"></i> Backup</button><button class="btn bs bsm" onclick="restore()"><i class="ti ti-database-import"></i> Restore</button>`};
function renderTB(){const p=TB_INFO[S.tab]||{t:'',s:''};document.getElementById('tb').innerHTML=`<div class="tb-l"><div class="tb-bar"></div><div><div class="tb-title">${p.t}</div><div class="tb-sub">${p.s}</div></div></div><div class="tb-r">${TB_ACTIONS[S.tab]||''}</div>`}

function buildPage(){
  if(S.tab==='dashboard')return pgDash();
  if(S.tab==='clients')return S.view?pgDetail(S.view):pgClients();
  if(S.tab==='pipeline')return pgPipeline();
  if(S.tab==='leads')return pgLeads();
  if(S.tab==='sip-book')return pgSIPBook();
  if(S.tab==='insurance')return pgInsurance();
  if(S.tab==='tasks')return pgTasks();
  if(S.tab==='calendar')return pgCalendar();
  if(S.tab==='communication')return pgComm();
  if(S.tab==='compliance')return pgCompliance();
  if(S.tab==='documents')return pgDocuments();
  if(S.tab==='ilog')return pgILog();
  if(S.tab==='reports')return pgReports();
  if(S.tab==='activity')return pgActivity();
  if(S.tab==='ce-export')return pgCustomExport();
  return '';
}

// DASHBOARD
function pgDash(){
  const totalAUM=S.clients.reduce((a,c)=>a+c.aum,0);
  const totalSIP=S.clients.reduce((a,c)=>a+c.sip,0);
  const openT=S.tasks.filter(t=>!t.done).length;
  const odT=S.tasks.filter(t=>!t.done&&isOD(t.due)).length;
  const pipePot=S.pipeline.filter(p=>p.stage!=='won').reduce((a,p)=>a+p.potential,0);
  const wonAUM=S.pipeline.filter(p=>p.stage==='won').reduce((a,p)=>a+p.potential,0);
  const pendKYC=S.clients.filter(c=>c.kyc==='pending').length;
  const expRP=S.clients.filter(c=>rpExpired(c)).length;
  const sipAlerts=getSIPAlerts();
  const checks=buildChecks();const ok=checks.filter(c=>c.ok).length;const pct=Math.round(ok/checks.length*100);
  let notices='';
  if(odT)notices+=`<div class="ntc nd"><i class="ti ti-alert-triangle"></i>${odT} overdue task${odT>1?'s':''}</div>`;
  if(expRP)notices+=`<div class="ntc nw"><i class="ti ti-clipboard-list"></i>${expRP} risk profile${expRP>1?'s':''} expired >2 years — re-profiling required</div>`;
  if(pendKYC)notices+=`<div class="ntc nw"><i class="ti ti-id-badge"></i>${pendKYC} client KYC pending</div>`;
  return `${notices}<div class="g5">${mc('Total AUM',fmtL(totalAUM),S.clients.length+' distribution clients','ti-trending-up','var(--accent)')}${mc('Monthly SIP Book',fmt(totalSIP),'Active SIP value','ti-refresh','var(--green)')}${mc('Pipeline Potential',fmtL(pipePot),S.pipeline.filter(p=>p.stage!=='won').length+' prospects','ti-filter','var(--amber)')}${mc('Open Tasks',openT,odT+' overdue','ti-checkbox',odT?'var(--red)':'var(--text3)')}${mc('AMFI Score',pct+'%',ok+'/'+checks.length+' OK','ti-shield-check',pct>80?'var(--green)':pct>60?'var(--amber)':'var(--red)')}</div>
  <div class="g2"><div>
    <div class="card"><div class="sec">Upcoming tasks</div>${S.tasks.filter(t=>!t.done).sort((a,b)=>a.due<b.due?-1:1).slice(0,5).map(t=>trowHtml(t)).join('')||empty('All tasks complete!','ti-circle-check')}</div>
    <div class="card"><div class="sec">Pending reviews</div>${S.clients.filter(c=>c.status==='review').map(c=>`<div class="row" onclick="openC(${c.id})"><div class="av ${avcl(c.color)}">${escapeHtml(ini(c.name))}</div><div style="flex:1"><div class="rn">${escapeHtml(c.name)}</div><div class="rs">Due ${c.nextReview} · ${fmtL(c.aum)}</div></div><span class="bdg b-rev">review</span></div>`).join('')||empty('No reviews pending','ti-circle-check')}</div>
    ${sipAlerts.length?`<div class="card"><div class="sec">SIP alerts (next 7 days)</div>${sipAlerts.map(a=>`<div class="row" onclick="openC(${a.c.id})"><div class="av ${avcl(a.c.color)}">${ini(a.c.name)}</div><div style="flex:1"><div class="rn">${a.c.name}</div><div class="rs">${fmt(a.c.sip)}/mo · ${a.c.sip?a.c.sip.toLocaleString('en-IN'):''} · due ${a.dueStr}</div></div><span class="bdg b-lo">${a.label}</span></div>`).join('')}</div>`:''}
  </div><div>
    <div class="card" style="margin-bottom:12px"><div class="sec">AMFI compliance snapshot</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><div style="font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${pct>80?'var(--green)':pct>60?'var(--amber)':'var(--red)'}">${pct}%</div><div style="flex:1"><div class="pw"><div class="pf" style="width:${pct}%;background:${pct>80?'var(--green)':pct>60?'var(--amber)':'var(--red)'}"></div></div><div style="font-size:11px;color:var(--text3);margin-top:4px">${ok}/${checks.length} compliant</div></div></div>
      ${checks.filter(c=>!c.ok).slice(0,5).map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><i class="ti ti-alert-circle" style="color:${c.sev==='high'?'var(--red)':'var(--amber)'};font-size:14px;flex-shrink:0"></i><span style="font-size:12px;color:var(--text2);flex:1">${c.label}</span><span class="bdg b-${c.sev==='high'?'err':'md'}">${c.sev}</span></div>`).join('')}
      <div style="margin-top:8px"><span style="font-size:11px;color:var(--accent);cursor:pointer;font-weight:500" onclick="sw('compliance')">View full checklist →</span></div>
    </div>
    <div class="card"><div class="sec">SIP book summary</div>
      ${S.clients.filter(c=>c.sip>0).sort((a,b)=>b.sip-a.sip).map(c=>`<div class="row" onclick="openC(${c.id})"><div class="av ${avcl(c.color)}">${escapeHtml(ini(c.name))}</div><div style="flex:1"><div class="rn">${escapeHtml(c.name)}</div><div class="rs">${(c.sips||[]).length} SIPs · due ${c.sipDue?c.sipDue+'th':'—'}</div></div><span style="font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--teal)">${fmt(c.sip)}/mo</span></div>`).join('')||empty('No SIP data','ti-refresh')}
    </div>
  </div></div>`;
}
function getSIPAlerts(){const today=new Date(TODAY),res=[];S.clients.forEach(c=>{if(!c.sipDue)return;const d=new Date(today.getFullYear(),today.getMonth(),c.sipDue);const diff=Math.round((d-today)/864e5);if(diff>=0&&diff<=7)res.push({c,dueStr:d.toISOString().slice(0,10),label:diff===0?'Today':diff+'d'});else if(diff<0&&diff>=-2)res.push({c,dueStr:d.toISOString().slice(0,10),label:'Missed'})});return res}

// CLIENTS
function pgClients(){
  let list=[...S.clients];
  if(S.search)list=list.filter(c=>[c.name,c.email,c.phone,c.city||'',c.folio||''].join(' ').toLowerCase().includes(S.search.toLowerCase()));
  if(S.fStat)list=list.filter(c=>c.status===S.fStat);
  if(S.fSeg)list=list.filter(c=>c.segment===S.fSeg);
  if(S.fRisk)list=list.filter(c=>c.risk===S.fRisk);
  return `<div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap"><input style="flex:1;min-width:150px" placeholder="Search name, email, phone, folio…" value="${escapeHtml(S.search)}" oninput="SS('search',this.value)"><select style="width:110px" onchange="SS('fStat',this.value)"><option value="">All status</option>${['active','review','prospect','cold'].map(s=>`<option${S.fStat===s?' selected':''}>${s}</option>`).join('')}</select><select style="width:110px" onchange="SS('fSeg',this.value)"><option value="">All segments</option>${['Retail','HNI','UHNI'].map(s=>`<option${S.fSeg===s?' selected':''}>${s}</option>`).join('')}</select><select style="width:110px" onchange="SS('fRisk',this.value)"><option value="">All risk</option>${['conservative','moderate','aggressive'].map(s=>`<option${S.fRisk===s?' selected':''}>${s}</option>`).join('')}</select>${S.search||S.fStat||S.fSeg||S.fRisk?`<button class="btn bg- bsm" onclick="clearF()"><i class="ti ti-x"></i></button>`:''}</div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:9px">${list.length} clients · ${fmtL(list.reduce((a,c)=>a+c.aum,0))} AUM · ${fmt(list.reduce((a,c)=>a+c.sip,0))}/mo SIP</div>
  <div class="card">${list.length?list.map(c=>`<div class="row" onclick="openC(${c.id})"><div class="av ${avcl(c.color)}">${escapeHtml(ini(c.name))}</div><div style="flex:1;min-width:0"><div class="rn">${escapeHtml(c.name)} ${c.kyc==='pending'?'<span class="bdg b-err" style="font-size:9px">KYC</span>':''} ${rpExpired(c)?'<span class="bdg b-md" style="font-size:9px">RP exp</span>':''}</div><div class="rs">${escapeHtml(c.segment)} · ${escapeHtml(c.city||'')} · ${fmtL(c.aum)} · SIP ${fmt(c.sip)}/mo · Primary folio: ${escapeHtml(c.folio||'—')}</div></div><div style="text-align:right;flex-shrink:0"><span class="bdg b-${c.status}">${escapeHtml(c.status)}</span><div class="rs" style="margin-top:3px">Review: ${escapeHtml(c.nextReview||'—')}</div></div><i class="ti ti-chevron-right" style="color:var(--text3);flex-shrink:0"></i></div>`).join(''):empty('No clients match filters')}</div>`;
}

function pgDetail(id){
  const c=S.clients.find(x=>x.id===id);if(!c)return empty('Not found');
  const cT=S.tasks.filter(t=>t.client===c.name&&!t.done);
  const dT=S.tasks.filter(t=>t.client===c.name&&t.done);
  const rv=daysTo(c.nextReview);const rvL=rv===null?'—':rv<0?Math.abs(rv)+'d overdue':rv===0?'Today':rv+'d';

  const sipsHtml=(c.sips||[]).map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="flex:1"><div style="font-size:12px;font-weight:500;color:var(--text)">${escapeHtml(s.fund)}</div><div style="font-size:11px;color:var(--text3)">AMC folio: ${escapeHtml(s.folio||'—')} · Due: ${s.date?s.date+'th':'-'} each month</div></div><span style="font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--teal)">${fmt(s.amount)}/mo</span></div>`).join('');
  const insHtml=(c.insurance||[]).map(ins=>{const d=daysTo(ins.renewal);return `<div style="padding:7px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:500">${ins.type} · ${ins.insurer}</span><span class="bdg ${d!==null&&d<=30?'b-err':d!==null&&d<=90?'b-md':'b-act'}">${d!==null&&d<=30?'Renew soon':'Active'}</span></div><div style="font-size:11px;color:var(--text3);margin-top:2px">Cover: ${fmt(ins.cover)} · Premium: ${fmt(ins.premium)}/yr · Renewal: ${ins.renewal||'—'}</div></div>`}).join('');
  return `<div style="display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <button class="btn bs bsm" onclick="closeD()"><i class="ti ti-arrow-left"></i> Clients</button>
    <button class="btn bs bsm" onclick="openM('editClient',${c.id})"><i class="ti ti-edit"></i> Edit</button>
    <button class="btn bs bsm" onclick="openM('addInteraction',${c.id})"><i class="ti ti-message-plus"></i> Log interaction</button>
    <button class="btn bs bsm" onclick="openM('addTask','${escapeHtml(c.name)}')"><i class="ti ti-plus"></i> Add task</button>
    <button class="btn bs bsm" onclick="openM('draftComm',${c.id})"><i class="ti ti-mail"></i> Draft message</button>
    <button class="btn bd bsm mla" onclick="delClient(${c.id})"><i class="ti ti-trash"></i> Delete</button>
  </div>
  <div class="g2"><div>
    <div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:13px"><div class="av ${avcl(c.color)}" style="width:46px;height:46px;font-size:15px;border-radius:50%;flex-shrink:0">${escapeHtml(ini(c.name))}</div><div style="flex:1"><div style="font-size:17px;font-weight:700;color:var(--text)">${escapeHtml(c.name)}</div><div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap"><span class="bdg b-${c.status}">${c.status}</span><span class="tag">${c.segment}</span><span class="tag">${c.risk} risk</span><span class="tag">${c.resStatus||'RI'}</span><span class="bdg ${c.kyc==='done'?'b-act':'b-err'}">${c.kyc==='done'?'✓ KYC':'⚠ KYC pending'}</span>${rpExpired(c)?'<span class="bdg b-md">RP expired</span>':''}<span class="bdg ${c.dpdpaConsent?'b-act':'b-md'}">${c.dpdpaConsent?'✓ DPDPA consent '+c.dpdpaConsent.date:'⚠ DPDPA consent missing'}</span></div></div></div>
    <div class="g2" style="margin-bottom:8px"><div class="mc" style="padding:10px"><div class="ml">AUM</div><div class="mv" style="font-size:18px">${fmtL(c.aum)}</div></div><div class="mc" style="padding:10px"><div class="ml">Monthly SIP</div><div class="mv" style="font-size:18px">${fmt(c.sip)}</div><div class="ms">Due: ${c.sipDue?c.sipDue+'th':'—'} · Primary folio: ${escapeHtml(c.folio||'—')}</div></div></div>
    <div class="g2" style="margin-bottom:0"><div class="mc" style="padding:10px"><div class="ml">Next Review</div><div style="font-size:13px;font-weight:600;color:${rv!==null&&rv<0?'var(--red)':'var(--text)'};font-family:'JetBrains Mono',monospace">${c.nextReview||'—'}</div><div class="ms" style="color:${rv!==null&&rv<0?'var(--red)':'var(--text3)'}">${rvL}</div></div><div class="mc" style="padding:10px"><div class="ml">ARN Code</div><div style="font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--teal)">${c.arnCode||'ARN-XXXXX'}</div></div></div></div>
    <div class="card"><div class="sec">Contact</div><div style="display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:12px;align-items:center;color:var(--text2)"><i class="ti ti-phone" style="color:var(--text3)"></i><span>${escapeHtml(c.phone||'—')}</span><i class="ti ti-mail" style="color:var(--text3)"></i><span>${escapeHtml(c.email||'—')}</span><i class="ti ti-map-pin" style="color:var(--text3)"></i><span>${escapeHtml(c.city||'—')}</span><i class="ti ti-cake" style="color:var(--text3)"></i><span>${escapeHtml(c.dob||'—')}</span><i class="ti ti-id-badge" style="color:var(--text3)"></i><span style="font-family:'JetBrains Mono',monospace">${escapeHtml(c.pan||'—')}</span><i class="ti ti-file-text" style="color:var(--text3)"></i><span>RP date: ${escapeHtml(c.rpDate||'—')} ${rpExpired(c)?'<span class="bdg b-err" style="font-size:9px">Expired</span>':''}</span></div><div class="sec">Notes</div><div style="font-size:12px;color:var(--text2);line-height:1.7">${escapeHtml(c.notes||'—')}</div></div>
    <div class="card"><div class="sec">Insurance</div>${insHtml||empty('No insurance records','ti-shield')}</div>
  </div><div>

        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px">${escapeHtml(p.name)}</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">${fmtL(p.potential)}</div>

        ${p.notes?`<div style="font-size:10px;color:var(--text3);margin-top:4px;font-style:italic;border-top:1px solid var(--border);padding-top:4px">${escapeHtml(p.notes)}</div>`:''}
        <div style="font-size:10px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace">${escapeHtml(p.date)}</div>
      </div>`).join('')}
      <div style="min-height:36px;border:2px dashed var(--border);border-radius:var(--rl);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3)" id="dz-${s}" ondragover="dzO(event,'${s}')" ondrop="dropCol(event,'${s}')">Drop here</div>
    </div>`;}).join('');
  return `<div class="g3">${mc('Total Pipeline',fmtL(pipTotal),S.pipeline.filter(p=>p.stage!=='won').length+' active prospects','ti-filter','var(--amber)')}${mc('Won AUM',fmtL(wonAUM),S.pipeline.filter(p=>p.stage==='won').length+' converted','ti-trophy','var(--green)')}${mc('Conversion Rate',conv+'%','Pipeline → Won','ti-percentage','var(--accent)')}</div>
  <div style="display:flex;gap:11px;overflow-x:auto;padding-bottom:8px;min-height:280px">${cols}</div>`;
}
function dragS(id){S.dragId=id;setTimeout(()=>{const el=document.getElementById('pc-'+id);if(el)el.style.opacity='.3'},0)}
function dragO(e,id){e.preventDefault()}
function dragE(){S.dragId=null;document.querySelectorAll('[id^="pc-"]').forEach(el=>el.style.opacity='')}
function dropC(e,s){e.stopPropagation();mvP(s);dragE();render()}
function dropCol(e,s){e.preventDefault();mvP(s);dragE();render()}
function dzO(e,s){e.preventDefault()}
function mvP(s){const p=S.pipeline.find(x=>x.id===S.dragId);if(p&&p.stage!==s){log('Moved '+p.name+' → '+s);p.stage=s;save()}}

  </div><div>

    body=`<div class="card" style="max-width:520px"><div class="sec">Corpus Calculator</div><div class="r2"><div class="fg"><label class="fl">Monthly SIP (₹)</label><input type="number" id="cc-s" value="10000" oninput="calcC()"></div><div class="fg"><label class="fl">Lump sum (₹)</label><input type="number" id="cc-l" value="0" oninput="calcC()"></div><div class="fg"><label class="fl">Return (%/yr)</label><input type="number" id="cc-r" value="12" oninput="calcC()"></div><div class="fg"><label class="fl">Years</label><input type="number" id="cc-y" value="20" oninput="calcC()"></div></div><div id="cc-res" style="background:var(--accent2);border:1px solid var(--blue-bd);border-radius:var(--rl);padding:14px"><div class="ml" style="color:var(--accent)">Projected Corpus</div><div id="cc-v" style="font-size:26px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace">—</div><div id="cc-b" style="font-size:12px;color:var(--text2);margin-top:5px"></div></div></div>`;

}
function calcC(){const s=+gv('cc-s')||0,l=+gv('cc-l')||0,r=(+gv('cc-r')||12)/100/12,n=(+gv('cc-y')||20)*12;const sc=r>0?s*((Math.pow(1+r,n)-1)/r)*(1+r):s*n;const lc=l*Math.pow(1+r*12,n/12);const tot=sc+lc,inv=s*n+l;const el=document.getElementById('cc-v');const br=document.getElementById('cc-b');if(el)el.textContent=fmt(Math.round(tot));if(br)br.textContent='Invested: '+fmt(Math.round(inv))+' · Gain: '+fmt(Math.round(tot-inv))+' ('+Math.round((tot/inv-1)*100)+'%)'}
function calcS(){const t=+gv('sp-t')||0,l=+gv('sp-l')||0,r=(+gv('sp-r')||12)/100/12,n=(+gv('sp-y')||20)*12;const lc=l*Math.pow(1+r*12,n/12);const rem=Math.max(0,t-lc);const sip=r>0?rem/((((Math.pow(1+r,n)-1)/r)*(1+r))):rem/n;const el=document.getElementById('sp-v');const br=document.getElementById('sp-b');if(el)el.textContent=fmt(Math.round(sip))+'/mo';if(br)br.textContent='Target: '+fmt(t)+' · Lump sum value: '+fmt(Math.round(lc))}

// CALENDAR
function pgCalendar(){
  const mN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const first=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate(),dipm=new Date(calY,calM,0).getDate();
  const evMap={};
  function addEv(date,label,cls){if(!evMap[date])evMap[date]=[];evMap[date].push({label,cls})}
  S.clients.forEach(c=>{if(c.nextReview)addEv(c.nextReview,c.name.split(' ')[0]+' review','ce-rv');if(c.sipDue){const d=String(c.sipDue).padStart(2,'0');const mn=String(calM+1).padStart(2,'0');addEv(`${calY}-${mn}-${d}`,c.name.split(' ')[0]+' SIP','ce-fe')}});
  S.tasks.filter(t=>!t.done).forEach(t=>{if(t.due)addEv(t.due,t.title.slice(0,16)+'…',t.type==='Compliance'?'ce-cp':t.type==='Review'?'ce-rv':'ce-tk')});
  S.pipeline.filter(p=>p.stage==='meeting').forEach(p=>{if(p.date)addEv(p.date,p.name.split(' ')[0]+' meeting','ce-mt')});
  let cells='',day=1,nd=1;const tc=Math.ceil((first+dim)/7)*7;
  for(let i=0;i<tc;i++){let ds='',num,om=false;if(i<first){num=dipm-first+i+1;om=true;ds=`${calY}-${String(calM).padStart(2,'0')}-${String(num).padStart(2,'0')}`}else if(day<=dim){num=day;ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(num).padStart(2,'0')}`;day++}else{num=nd++;om=true;ds=`${calY}-${String(calM+2).padStart(2,'0')}-${String(num).padStart(2,'0')}`}
  const isT=ds===TODAY;const evs=evMap[ds]||[];cells+=`<div class="cal-day${isT?' today':''}${om?' om':''}"><div class="cal-dn">${num}</div>${evs.slice(0,3).map(e=>`<div class="ce ${e.cls}" title="${e.label}">${e.label}</div>`).join('')}${evs.length>3?`<div style="font-size:9px;color:var(--text3)">+${evs.length-3}</div>`:''}</div>`}
  const upcoming=[];Object.entries(evMap).filter(([d])=>d>=TODAY).sort(([a],[b])=>a>b?1:-1).slice(0,10).forEach(([d,evs])=>evs.forEach(e=>upcoming.push({date:d,...e})));
  const syncSection=`<div class="card"><div class="sec">Sync with external calendar</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Export SIP due dates, client reviews, ARN renewal, compliance and follow-up deadlines to your preferred calendar app.</div>
    <div style="display:flex;flex-direction:column;gap:0"><button class="sync-btn google" onclick="(typeof G!=='undefined'&&G.ok)?gSyncCal():syncCal('google')"><i class="ti ti-brand-google" style="font-size:16px"></i> Google Calendar</button><button class="sync-btn outlook" onclick="syncCal('outlook')"><i class="ti ti-brand-windows" style="font-size:16px"></i> Outlook / Microsoft 365</button><button class="sync-btn apple" onclick="syncCal('apple')"><i class="ti ti-brand-apple" style="font-size:16px"></i> Apple Calendar (macOS/iOS)</button><button class="sync-btn ical" onclick="syncCal('ical')"><i class="ti ti-calendar-down" style="font-size:16px"></i> Download .ics file</button></div>
    ${calSynced.google?`<div class="sync-ok"><i class="ti ti-circle-check"></i>Synced with Google Calendar · ${TODAY}</div>`:''}${calSynced.outlook?`<div class="sync-ok"><i class="ti ti-circle-check"></i>Synced with Outlook · ${TODAY}</div>`:''}${calSynced.apple?`<div class="sync-ok"><i class="ti ti-circle-check"></i>Exported to Apple Calendar · ${TODAY}</div>`:''}
    <div style="font-size:11px;color:var(--text3);margin-top:8px"><i class="ti ti-info-circle"></i> Exported events: SIP due dates, client reviews, tasks, AMFI compliance deadlines, pipeline meetings</div></div>`;
  return `<div class="g2"><div>
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:11px"><button class="btn bs bsm" onclick="calP()"><i class="ti ti-chevron-left"></i></button><span style="font-size:14px;font-weight:600;color:var(--text)">${mN[calM]} ${calY}</span><button class="btn bs bsm" onclick="calN()"><i class="ti ti-chevron-right"></i></button><button class="btn bg- bsm" onclick="calT()">Today</button></div>
    <div class="cal-grid">${days.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}${cells}</div>
  </div><div>
    ${syncSection}
    <div class="card"><div class="sec">Upcoming events</div>${upcoming.length?upcoming.map(e=>`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="width:36px;text-align:center;background:var(--bg2);border-radius:var(--r);padding:3px;flex-shrink:0"><div style="font-size:15px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace">${e.date.slice(8)}</div><div style="font-size:9px;color:var(--text3)">${mN[parseInt(e.date.slice(5,7))-1].slice(0,3)}</div></div><div class="ce ${e.cls}" style="display:inline-block">${e.label}</div></div>`).join(''):empty('No upcoming events','ti-calendar')}
    <div class="sec" style="margin-top:12px">Legend</div>${[['ce-rv','Client reviews'],['ce-fe','SIP due dates'],['ce-tk','Tasks/follow-ups'],['ce-cp','Compliance deadlines'],['ce-mt','Pipeline meetings']].map(([cls,l])=>`<div style="display:flex;align-items:center;gap:7px;padding:3px 0"><div class="ce ${cls}" style="padding:2px 8px">${l}</div></div>`).join('')}</div>
  </div></div>`;
}
function syncCal(type){
  const events=[];
  S.clients.forEach(c=>{if(c.nextReview)events.push({date:c.nextReview,summary:`Client Review — ${escapeHtml(c.name)}`,desc:`SIP: ${fmt(c.sip)}/mo · AUM: ${fmtL(c.aum)}`});if(c.sipDue){const mn=String(calM+1).padStart(2,'0');events.push({date:`${calY}-${mn}-${String(c.sipDue).padStart(2,'0')}`,summary:`SIP Due — ${escapeHtml(c.name)}`,desc:`${fmt(c.sip)}/month`})}});
  S.tasks.filter(t=>!t.done).forEach(t=>{if(t.due)events.push({date:t.due,summary:`[${t.type}] ${t.title}`,desc:t.client?`Client: ${t.client}`:''})});
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Wealth CRM//Manan Dua//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  events.filter(e=>e.date).forEach(e=>{const dt=e.date.replace(/-/g,'');ics.push('BEGIN:VEVENT',`DTSTART;VALUE=DATE:${dt}`,`DTEND;VALUE=DATE:${dt}`,`SUMMARY:${icsEscape(e.summary)}`,`DESCRIPTION:${icsEscape(e.desc||'')}`,`UID:${dt}-${Math.random().toString(36).slice(2)}@mfd-advisoros`,'END:VEVENT')});
  ics.push('END:VCALENDAR');
  const blob=new Blob([ics.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='mfd_advisoros_calendar.ics';a.click();
  if(type==='google'){window.open('https://calendar.google.com/calendar/r/settings/export','_blank');calSynced.google=true;toast('Downloaded .ics — import into Google Calendar','info')}
  else if(type==='outlook'){window.open('https://outlook.live.com/calendar/0/importcalendar','_blank');calSynced.outlook=true;toast('Downloaded .ics — import into Outlook','info')}
  else if(type==='apple'){calSynced.apple=true;toast('Open the .ics file — Apple Calendar will import automatically')}
  else toast('Calendar file downloaded');
  log('Calendar exported: '+type);render();
}
function calP(){calM--;if(calM<0){calM=11;calY--}render()}
function calN(){calM++;if(calM>11){calM=0;calY++}render()}
function calT(){calM=new Date(TODAY).getMonth();calY=new Date(TODAY).getFullYear();render()}

function daysUntilDue(due){ if(!due) return null; return daysTo(due); }

function pgCompliance(){
  const checks=buildChecks();const ok=checks.filter(c=>c.ok).length;const pct=Math.round(ok/checks.length*100);
  const col=pct>80?'var(--green)':pct>60?'var(--amber)':'var(--red)';
  const cats=[...new Set(checks.map(c=>c.cat))];const st=S.sub.comp||'all';
  let vis=st==='all'?checks:checks.filter(c=>c.cat===st);
  vis=[...vis].sort((a,b)=>{
    if(a.ok!==b.ok) return a.ok?1:-1;
    const da=daysUntilDue(a.due), db=daysUntilDue(b.due);
    if(da!==null&&db!==null) return da-db;
    if(da!==null) return -1;
    if(db!==null) return 1;
    const sevOrder={high:0,medium:1,low:2};
    return (sevOrder[a.sev]||1)-(sevOrder[b.sev]||1);
  });
  const overdueCount = checks.filter(c=>!c.ok&&c.due&&isOD(c.due)).length;
  const dueSoonCount = checks.filter(c=>!c.ok&&c.due&&!isOD(c.due)&&daysUntilDue(c.due)<=7).length;

  return `<div class="g4">${mc('AMFI Compliance Score',pct+'%',ok+'/'+checks.length+' compliant','ti-shield-check',col)}
  ${mc('Overdue',overdueCount,'past deadline','ti-alert-triangle',overdueCount?'var(--red)':'var(--text2)')}
  ${mc('Due within 7 days',dueSoonCount,'act now','ti-clock-exclamation',dueSoonCount?'var(--amber)':'var(--text2)')}
  ${mc('Action needed',checks.filter(c=>!c.ok).length,'items','ti-alert-circle',checks.filter(c=>!c.ok).length?'var(--red)':'var(--green)')}</div>
  <div style="margin-bottom:11px"><div class="pw" style="height:6px"><div class="pf" style="width:${pct}%;background:${col};height:6px"></div></div></div>
  ${overdueCount?`<div class="ntc nd" style="margin-bottom:11px"><i class="ti ti-alert-triangle"></i>${overdueCount} compliance item${overdueCount>1?'s are':' is'} past deadline — resolve immediately</div>`:''}
  <div class="itabs">${[{k:'all',l:'All'}, ...cats.map(c=>({k:c,l:c}))].map(t=>`<div class="itab${st===t.k?' on':''}" onclick="setST('comp','${t.k}')">${t.l}</div>`).join('')}</div>
  <div class="card">${vis.map(c=>{
    const dDays=daysUntilDue(c.due);
    const dueLabel2 = c.due ? (dDays<0?Math.abs(dDays)+'d overdue':dDays===0?'Due today':dDays===1?'Due tomorrow':'Due in '+dDays+'d') : null;
    const dueBadgeCls = c.due ? (dDays<0?'b-err':dDays<=3?'b-err':dDays<=7?'b-md':'b-cld') : '';
    const isOpen = S.sub.compOpen===c.id;
    return `<div style="border-radius:var(--r);overflow:hidden">
    <div style="display:flex;align-items:flex-start;gap:11px;padding:10px 12px;cursor:pointer;transition:background .1s" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''" onclick="toggleCompItem('${c.id}')">
      <i class="ti ti-${c.ok?'circle-check':'alert-circle'}" style="font-size:17px;color:${c.ok?'var(--green)':c.sev==='high'?'var(--red)':'var(--amber)'};flex-shrink:0;margin-top:1px"></i>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          ${c.label}
          <span class="bdg b-${c.cat==='SEBI'?'rev':'te'}" style="font-size:9px">${c.cat}</span>
          ${dueLabel2?`<span class="bdg ${dueBadgeCls}" style="font-size:9px"><i class="ti ti-clock" style="font-size:9px"></i> ${dueLabel2}</span>`:''}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${escapeHtml(c.note)}</div>
        ${!c.ok?`<div style="font-size:11px;color:${c.sev==='high'?'var(--red)':'var(--amber)'};margin-top:2px">⚠ ${escapeHtml(c.val)}</div>`:''}
      </div>
      <span class="bdg ${c.ok?'b-act':c.sev==='high'?'b-err':'b-md'}" style="flex-shrink:0">${c.ok?'OK':c.sev}</span>
      <i class="ti ti-chevron-${isOpen?'up':'down'}" style="color:var(--text3);font-size:14px;flex-shrink:0;margin-top:2px"></i>
    </div>
    ${isOpen?`<div style="padding:0 12px 14px 40px;background:var(--bg2)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px">
        <div>
          <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Steps to resolve</div>
          <ol style="margin:0;padding-left:16px;font-size:11px;color:var(--text2);line-height:1.8">${(c.steps||[]).map(s=>`<li>${s}</li>`).join('')}</ol>

          <div style="margin-bottom:10px">${(c.docs||[]).map(d=>`<span class="tag" style="display:inline-flex;align-items:center;gap:4px"><i class="ti ti-file" style="font-size:11px"></i>${d}</span>`).join('')}</div>

        </div>
      </div>
      ${!c.ok?`<div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
        ${c.affected&&c.affected.length?`<button class="btn bp bsm" onclick="event.stopPropagation();createComplianceTasks('${c.id}')"><i class="ti ti-list-check"></i> Create task${c.affected.length>1?'s':''} for all ${c.affected.length} client${c.affected.length>1?'s':''}</button>`
          :c.solo?`<button class="btn bp bsm" onclick="event.stopPropagation();createSoloComplianceTask('${c.id}')"><i class="ti ti-plus"></i> Create task</button>`:''}
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
        ${compTaskExists(c.taskTitle)?`<button class="btn bte bsm" onclick="event.stopPropagation();compGoToTask('${c.taskTitle}')"><i class="ti ti-arrow-right"></i> View open task</button>`:''}
        ${!c.ok&&!((S.compOverrides||{})[c.id])?`<button class="btn bg- bsm" onclick="event.stopPropagation();markCompDone('${c.id}')" style="border:1px solid var(--green);color:var(--green)"><i class="ti ti-circle-check"></i> Mark as done</button>`:c.ok&&(S.compOverrides||{})[c.id]?`<button class="btn bg- bsm" onclick="event.stopPropagation();clearCompDone('${c.id}')" style="font-size:10px;color:var(--text3)"><i class="ti ti-x"></i> Clear override</button>`:''}
        ${compIsSnoozed(c.id)?`<button class="btn bs bsm" onclick="event.stopPropagation();unsnoozeComp('${c.id}')"><i class="ti ti-bell"></i> Snoozed — tap to clear</button>`:`<button class="btn bs bsm" onclick="event.stopPropagation();snoozeComp('${c.id}',7)"><i class="ti ti-bell-off"></i> Snooze 7 days</button>`}
      </div>
    </div>`:''}
    </div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function toggleCompItem(id){ S.sub.compOpen = S.sub.compOpen===id ? null : id; render(); }

function createComplianceTasks(checkId){
  const checks=buildChecks();
  const item=checks.find(c=>c.id===checkId);
  if(!item||!item.affected||!item.affected.length) return;
  let created=0;
  item.affected.forEach(cl=>{
    const exists=S.tasks.some(t=>!t.done&&t.client===cl.name&&t.title.includes(item.taskTitle.trim()));
    if(exists) return;
    S.tasks.push({ id:S.nextId++, title:(item.taskTitle+' '+cl.name).trim(), due:item.due||addBizDays(TODAY,5), priority:item.sev==='high'?'high':'medium', type:item.taskType||'Compliance', client:cl.name, done:false });
    created++;
  });
  if(created){ log('Created '+created+' compliance task(s) for: '+item.label); save(); toast(created+' task'+(created>1?'s':'')+' created'); }
  else toast('Tasks already exist for these clients','info');
  render();
}

function createSoloComplianceTask(checkId){
  const checks=buildChecks();
  const item=checks.find(c=>c.id===checkId);
  if(!item) return;
  const exists=S.tasks.some(t=>!t.done&&t.title===item.taskTitle);
  if(exists){ toast('Task already exists','info'); return; }
  S.tasks.push({ id:S.nextId++, title:item.taskTitle, due:item.due||addBizDays(TODAY,14), priority:item.sev==='high'?'high':'medium', type:item.taskType||'Compliance', client:'', done:false });
  log('Created compliance task: '+item.taskTitle); save(); toast('Task created'); render();
}

function renderModal(){
  const root=document.getElementById('modal-root');
  if(!S.modal){root.innerHTML='';return}
  let inner='';
  if(S.modal==='addClient'||S.modal==='editClient')inner=mClient();
  else if(S.modal==='addPipe'||S.modal==='editPipe')inner=mPipe();
  else if(S.modal==='addTask'||S.modal==='editTask')inner=mTask();

  else if(S.modal==='draftComm')inner=mComm();
  root.innerHTML=`<div class="mo" onclick="moClose(event)">${inner}</div>`;
}

// EXPORT
function dl(name,href){const a=document.createElement('a');a.href=href;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a)}
function icsEscape(x){
  // RFC 5545 requires these characters to be backslash-escaped in TEXT fields (SUMMARY, DESCRIPTION, etc.)
  // Order matters: backslashes must be escaped first, before adding new backslashes for the other characters.
  return String(x||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}
function csvSafe(x){
  var s = String(x);
  // Prevents CSV/formula injection — Excel/Sheets can execute a cell as a formula if it starts with these characters
  if(/^[=+\-@]/.test(s)) s = "'" + s;
  return s;
}
function csv(hdr,rows){return 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent([hdr.join(','),...rows.map(r=>r.map(x=>`"${csvSafe(x).replace(/"/g,'""')}"`).join(','))].join('\n'))}
function expCSV(){dl('mfd_clients_'+TODAY+'.csv',csv(['Name','Phone','Email','City','Segment','AUM','SIP','SIP Due','Risk','Status','KYC','PAN','DOB','Folio','ARN','Goals','RP Date','Consent Date','Source','Referred By','Next Review','Last Contact','Notes'],S.clients.map(c=>[c.name,c.phone||'',c.email||'',c.city||'',c.segment,c.aum,c.sip,c.sipDue||'',c.risk,c.status,c.kyc,c.pan||'',c.dob||'',c.folio||'',c.arnCode||'',(c.goals||[]).map(g=>g.name).join(';'),c.rpDate||'',c.agDate||'',c.source||'',c.referredBy||'',c.nextReview||'',c.lastContact||'',c.notes||''])));log('Exported clients CSV');toast('Clients exported')}
function expTasksCSV(){dl('mfd_tasks_'+TODAY+'.csv',csv(['Title','Due','Priority','Type','Client','Done'],S.tasks.map(t=>[t.title,t.due,t.priority,t.type,t.client||'',t.done?'Yes':'No'])));toast('Tasks exported')}
function expSIPCSV(){const rows=[];S.clients.forEach(c=>(c.sips||[]).forEach(s=>rows.push([c.name,s.fund,s.amount,s.folio||'',s.date||'',c.arnCode||''])));dl('mfd_sipbook_'+TODAY+'.csv',csv(['Client','Fund','SIP Amount','Folio','SIP Date','ARN'],rows));toast('SIP book exported')}
function expPipeCSV(){dl('mfd_pipeline_'+TODAY+'.csv',csv(['Name','Stage','Potential AUM','Source','Referred By','Phone','Date','Notes'],S.pipeline.map(p=>[p.name,p.stage,p.potential,p.source||'',p.referredBy||'',p.phone||'',p.date||'',p.notes||''])));toast('Pipeline exported')}
function expDocCSV(){dl('mfd_documents_'+TODAY+'.csv',csv(['Client','KYC','Risk Profile','Consent Form','PAN','Folio','RP Date','Consent Date'],S.clients.map(c=>[c.name,c.kyc,rpExpired(c)?'Expired':'Current',c.agDate?'Signed':'Missing',c.pan||'Missing',c.folio||'—',c.rpDate||'—',c.agDate||'—'])));toast('Documents exported')}
function expILogCSV(){const rows=[];S.clients.forEach(c=>(c.ilog||[]).forEach(l=>rows.push([c.name,l.ts,l.type,l.note])));dl('mfd_ilog_'+TODAY+'.csv',csv(['Client','Date','Type','Note'],rows));toast('Interaction log exported')}
function backup(){dl('mfd_backup_'+TODAY+'.json','data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify({version:2,at:ts0(),app:'Wealth CRM',by:'Manan Dua',clients:S.clients,pipeline:S.pipeline,tasks:S.tasks,actLog:S.actLog,nextId:S.nextId},null,2)));log('Full backup exported');toast('Backup downloaded')}
function restore(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.clients){alert('Invalid file');return}if(!confirm('Replace all data?'))return;['clients','pipeline','tasks','actLog'].forEach(k=>{if(d[k])S[k]=d[k]});S.nextId=Math.max(...[...S.clients,...S.pipeline,...S.tasks].map(x=>x.id||0),19)+1;save();log('Restored: '+f.name);toast('Restored');render()}catch(err){alert('Error: '+err.message)}};r.readAsText(f)};inp.click()}

let G_CAL_NAME    = 'Wealth CRM';
let G_LS          = 'mfd_g_';

var G = {ok:false,user:null,tok:null,exp:null,sheet:null,cal:null,stat:'idle',synced:null,tc:null};

function gInit() {
  if (!G_CLIENT_ID || G_CLIENT_ID === 'YOUR_CLIENT_ID_HERE') { setTimeout(gDrawSidebar,500); return; }
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = () => {
    G.tc = google.accounts.oauth2.initTokenClient({client_id:G_CLIENT_ID, scope:G_SCOPES, callback:gGotToken});
    const stored = localStorage.getItem(G_LS+'u');
    if (stored) {
      try { G.user=JSON.parse(stored); G.sheet=localStorage.getItem(G_LS+'s'); G.cal=localStorage.getItem(G_LS+'c'); G.tc.requestAccessToken({prompt:'none'}); } catch(e) {}
    }
    setTimeout(gDrawSidebar,100);
  };
  document.head.appendChild(s);
}

function gLogin()  { if (!G.tc) { toast('Add your Google Client ID first','err'); return; } G.tc.requestAccessToken({prompt:'consent'}); }
function gLogout() {
  if (G.tok) google.accounts.oauth2.revoke(G.tok, ()=>{});
  Object.assign(G, {ok:false,user:null,tok:null,sheet:null});
  [G_LS+'u',G_LS+'s',G_LS+'c'].forEach(k=>localStorage.removeItem(k));
  toast('Signed out of Google'); gDrawSidebar(); render();
}

function gGotToken(r) {
  if (r.error) { if (r.error !== 'interaction_required') G.ok=false; gDrawSidebar(); return; }
  G.tok=r.access_token; G.exp=Date.now()+r.expires_in*1000; G.ok=true; G.stat='syncing';
  gDrawSidebar();
  gFetch('https://www.googleapis.com/oauth2/v3/userinfo').then(u => {
    G.user={name:u.name,email:u.email,pic:u.picture};
    localStorage.setItem(G_LS+'u', JSON.stringify(G.user)); gDrawSidebar();
  }).catch(()=>{});
  gBoot();
}

async function gFetch(url, o={}) {
  if (!G.tok) throw new Error('Not signed in');
  const r = await fetch(url, {...o, headers:{Authorization:'Bearer '+G.tok,'Content-Type':'application/json',...(o.headers||{})}});
  if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e?.error?.message||'HTTP '+r.status); }
  return r.status===204 ? null : r.json();
}

async function gBoot() {
  try {
    await gEnsureSheet(); await gEnsureCal(); await gPull();
    G.stat='ok'; G.synced=new Date().toLocaleTimeString();
    toast('Google sync complete ✓'); log('Google Sheets + Calendar connected');
    render(); gDrawSidebar();
  } catch(e) { G.stat='error'; toast('Sync error: '+e.message,'err'); gDrawSidebar(); }
}

// ── Sheets ────────────────────────────────────────────────────────────────────────
async function gEnsureSheet() {
  let id=G.sheet||localStorage.getItem(G_LS+'s');
  if (id) { try { await gFetch('https://sheets.googleapis.com/v4/spreadsheets/'+id+'?fields=spreadsheetId'); G.sheet=id; return; } catch(e) { id=null; } }
  const q=encodeURIComponent("name='"+G_SHEET_NAME+"' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false");
  const dr=await gFetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id)&pageSize=1');
  if (dr.files?.[0]) { G.sheet=dr.files[0].id; localStorage.setItem(G_LS+'s',G.sheet); return; }
  const cr=await gFetch('https://sheets.googleapis.com/v4/spreadsheets', {
    method:'POST',
    body:JSON.stringify({properties:{title:G_SHEET_NAME}, sheets:['Clients','Tasks','Pipeline','Log'].map(t=>({properties:{title:t}}))})
  });
  G.sheet=cr.spreadsheetId; localStorage.setItem(G_LS+'s',G.sheet);
}

function gJ(s,fb){ try{return s?JSON.parse(s):fb}catch(e){return fb} }

async function gPull() {
  const sid=G.sheet;
  const rq=['Clients!A2:AD','Tasks!A2:G','Pipeline!A2:I','Log!A2:B'].map(r=>'ranges='+encodeURIComponent(r)).join('&');
  const res=await gFetch('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values:batchGet?'+rq);
  const [cr,tr,pr,lr]=res.valueRanges.map(r=>r.values||[]);
  if (cr.length) S.clients=cr.map(r=>({
    id:+r[0]||0,name:r[1]||'',phone:r[2]||'',email:r[3]||'',city:r[4]||'',pan:r[5]||'',dob:r[6]||'',
    aum:+r[7]||0,sip:+r[8]||0,sipDue:r[9]?+r[9]:null,risk:r[10]||'moderate',status:r[11]||'prospect',
    segment:r[12]||'Retail',kyc:r[13]||'pending',rpDate:r[14]||'',agDate:r[15]||'',
    feeType:r[16]||'',feeAmt:+r[17]||0,feeFreq:r[18]||'',nextReview:r[19]||'',lastContact:r[20]||'',
    source:r[21]||'',referredBy:r[22]||'',notes:r[23]||'',goals:gJ(r[24],[]),color:r[25]||'b',
    ilog:gJ(r[26],[]),insurance:gJ(r[27],[]),folio:r[28]||'',arnCode:r[29]||'',sips:gJ(r[30],[]),
  }));
  if (tr.length) S.tasks=tr.map(r=>({id:+r[0],title:r[1]||'',due:r[2]||'',priority:r[3]||'medium',type:r[4]||'Service',client:r[5]||'',done:r[6]==='TRUE'}));
  if (pr.length && S.pipeline) S.pipeline=pr.map(r=>({id:+r[0],name:r[1]||'',stage:r[2]||'lead',potential:+r[3]||0,source:r[4]||'',referredBy:r[5]||'',phone:r[6]||'',date:r[7]||'',notes:r[8]||''}));
  if (lr.length) S.actLog=lr.map(r=>({ts:r[0]||'',msg:r[1]||''}));
  S.nextId=Math.max(...S.clients.map(x=>x.id||0),...S.tasks.map(x=>x.id||0),S.nextId||19)+1;
  save();
}

async function gPush() {
  if (!G.ok||!G.sheet) return;
  G.stat='syncing'; gBadge();
  try {
    const sid=G.sheet;
    const clientRows=S.clients.map(c=>[
      c.id,c.name,c.phone||'',c.email||'',c.city||'',c.pan||'',c.dob||'',
      c.aum||0,c.sip||0,c.sipDue||'',c.risk,c.status,c.segment,c.kyc,
      c.rpDate||'',c.agDate||'',c.feeType||'',c.feeAmt||'',c.feeFreq||'',
      c.nextReview||'',c.lastContact||'',c.source||'',c.referredBy||'',c.notes||'',
      JSON.stringify(c.goals||[]),c.color||'b',JSON.stringify(c.ilog||[]),
      JSON.stringify(c.insurance||[]),c.folio||'',c.arnCode||'',JSON.stringify(c.sips||[]),
    ]);
    const taskRows=S.tasks.map(t=>[t.id,t.title,t.due,t.priority,t.type,t.client||'',t.done?'TRUE':'FALSE']);
    const pipeRows=(S.pipeline||[]).map(p=>[p.id,p.name,p.stage,p.potential,p.source||'',p.referredBy||'',p.phone||'',p.date||'',p.notes||'']);
    const logRows=S.actLog.slice(0,200).map(l=>[l.ts,l.msg]);
    await gFetch('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values:batchClear',{
      method:'POST', body:JSON.stringify({ranges:['Clients!A2:AD','Tasks!A2:G','Pipeline!A2:I','Log!A2:B']})
    });
    await gFetch('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values:batchUpdate',{
      method:'POST', body:JSON.stringify({valueInputOption:'RAW', data:[
        {range:'Clients!A2:AD',values:clientRows},
        {range:'Tasks!A2:G',values:taskRows},
        {range:'Pipeline!A2:I',values:pipeRows},
        {range:'Log!A2:B',values:logRows},
      ]})
    });
    G.stat='ok'; G.synced=new Date().toLocaleTimeString(); gBadge();
  } catch(e) { G.stat='error'; gBadge(); toast('Sync failed: '+e.message,'err'); }
}

// Hook save() using var reassignment — NOT a function redeclaration
const _gOrigSave = save;
save = function() { _gOrigSave(); if(G.ok&&G.sheet){ clearTimeout(save._t); save._t=setTimeout(gPush,1500); } };

// ── Gmail ─────────────────────────────────────────────────────────────────────────
async function gSend(to, subj, body) {
  if (!G.ok) { toast('Sign in with Google first','err'); return; }
  const raw=['To: '+to,'From: '+(G.user?.email||'me'),'Subject: '+subj,'MIME-Version: 1.0','Content-Type: text/plain; charset=utf-8','',body].join('\r\n');
  const enc=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  try { await gFetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{method:'POST',body:JSON.stringify({raw:enc})}); toast('Email sent via Gmail ✓'); log('Gmail: sent to '+to); }
  catch(e) { toast('Gmail error: '+e.message,'err'); }
}
async function gDraft(to, subj, body) {
  if (!G.ok) { toast('Sign in with Google first','err'); return; }
  const raw=['To: '+to,'From: '+(G.user?.email||'me'),'Subject: '+subj,'MIME-Version: 1.0','Content-Type: text/plain; charset=utf-8','',body].join('\r\n');
  const enc=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  try { await gFetch('https://gmail.googleapis.com/gmail/v1/users/me/drafts',{method:'POST',body:JSON.stringify({message:{raw:enc}})}); toast('Saved to Gmail drafts ✓'); window.open('https://mail.google.com/mail/u/0/#drafts','_blank'); }
  catch(e) { toast('Gmail draft error: '+e.message,'err'); }
}
function gParseMsg(body) {
  let subj='Message from Manan Dua', txt=body||'';
  if (txt.startsWith('Subject:')) { const ls=txt.split('\n'); subj=ls[0].replace('Subject:','').trim(); txt=ls.slice(2).join('\n'); }
  return {subj,txt};
}
function gCommSend() {
  const body=document.getElementById('cc-bo')?.value||S.commDraft;
  const cid=document.getElementById('cc-cl')?.value;
  const c=S.clients.find(x=>x.id==cid);
  if (!body) { toast('Write a message first','err'); return; }
  if (!c?.email) { toast('Select a client with an email address','err'); return; }
  const {subj,txt}=gParseMsg(body);
  if (confirm('Send to '+c.name+' <'+c.email+'>?\n\nSubject: '+subj)) gSend(c.email,subj,txt);
}
function gCommDraft() {
  const body=document.getElementById('cc-bo')?.value||S.commDraft;
  const cid=document.getElementById('cc-cl')?.value;
  const c=S.clients.find(x=>x.id==cid);
  if (!body) { toast('Write a message first','err'); return; }
  const {subj,txt}=gParseMsg(body);
  gDraft(c?.email||'',subj,txt);
}

// ── Calendar ──────────────────────────────────────────────────────────────────────
async function gEnsureCal() {
  let id=G.cal||localStorage.getItem(G_LS+'c');
  if(id){try{await gFetch('https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(id));G.cal=id;return}catch(e){id=null}}
  const ls=await gFetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?fields=items(id,summary)');
  const ex=(ls.items||[]).find(x=>x.summary===G_CAL_NAME);
  if(ex){G.cal=ex.id;localStorage.setItem(G_LS+'c',G.cal);return}
  const cr=await gFetch('https://www.googleapis.com/calendar/v3/calendars',{method:'POST',body:JSON.stringify({summary:G_CAL_NAME,description:'AdvisorOS practice events',timeZone:'Asia/Kolkata'})});
  G.cal=cr.id; localStorage.setItem(G_LS+'c',G.cal);
}
async function gSyncCal() {
  if(!G.ok||!G.cal){toast('Sign in with Google first','err');return}
  G.stat='syncing'; gBadge();
  try {
    const cid=encodeURIComponent(G.cal);
    const now=new Date().toISOString();
    const ex=await gFetch('https://www.googleapis.com/calendar/v3/calendars/'+cid+'/events?timeMin='+encodeURIComponent(now)+'&singleEvents=true&maxResults=250&fields=items(id)');
    if(ex.items?.length) await Promise.all(ex.items.map(ev=>gFetch('https://www.googleapis.com/calendar/v3/calendars/'+cid+'/events/'+ev.id,{method:'DELETE'}).catch(()=>{})));
    const evts=[];
    S.clients.forEach(c=>{
      if(c.nextReview&&c.nextReview>=TODAY) evts.push({summary:'Review — '+c.name,description:'AUM: '+fmtL(c.aum)+'\nSIP: '+fmt(c.sip)+'/mo',start:{date:c.nextReview},end:{date:c.nextReview},colorId:'1',reminders:{useDefault:false,overrides:[{method:'popup',minutes:1440},{method:'email',minutes:10080}]}});
      if(c.sipDue){[0,1].forEach(off=>{const d=new Date(TODAY);d.setDate(1);d.setMonth(d.getMonth()+off);d.setDate(c.sipDue);if(isNaN(d.getTime()))return;const ds=d.toISOString().slice(0,10);if(ds<TODAY)return;evts.push({summary:'SIP — '+c.name+' ('+fmt(c.sip)+')',start:{date:ds},end:{date:ds},colorId:'10',reminders:{useDefault:false,overrides:[{method:'popup',minutes:1440}]}})});}
    });
    S.tasks.filter(t=>!t.done&&t.due>=TODAY).forEach(t=>evts.push({summary:'['+t.type+'] '+t.title,description:t.client?'Client: '+t.client:'',start:{date:t.due},end:{date:t.due},colorId:t.type==='Compliance'?'11':'5',reminders:{useDefault:false,overrides:[{method:'popup',minutes:480}]}}));
    if(S.pipeline)(S.pipeline||[]).filter(p=>p.stage==='meeting'&&p.date>=TODAY).forEach(p=>evts.push({summary:'Meeting — '+p.name,description:'Potential: '+fmtL(p.potential),start:{date:p.date},end:{date:p.date},colorId:'3',reminders:{useDefault:false,overrides:[{method:'popup',minutes:60}]}}));
    await Promise.all(evts.map(ev=>gFetch('https://www.googleapis.com/calendar/v3/calendars/'+cid+'/events',{method:'POST',body:JSON.stringify(ev)})));
    G.stat='ok'; G.synced=new Date().toLocaleTimeString();
    toast(evts.length+' events synced to Google Calendar ✓'); log('Calendar: '+evts.length+' events synced');
    gBadge(); render();
  } catch(e) { G.stat='error'; toast('Calendar error: '+e.message,'err'); gBadge(); }
}

  const el=document.getElementById('g-badge'); if(!el) return;

  const col={idle:'var(--text3)',syncing:'var(--amber)',ok:'var(--green)',error:'var(--red)'};
  el.textContent=m[G.stat]||'○'; el.style.color=col[G.stat]||'var(--text3)';
  el.title=G.synced?'Last synced: '+G.synced:'Not synced';
}

    el=document.createElement('div'); el.id='g-sidebar';

      '</div>'+
      '<div style="padding:2px 10px"><button onclick="gLogout()" style="width:100%;padding:5px;font-size:10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg);color:var(--text3);cursor:pointer">Sign out of Google</button></div>';
    gBadge();
  } else {

        ' style="width:100%;padding:7px;font-size:11px;font-weight:500;border-radius:var(--r);'+
        'border:1px solid '+(cfg?'#4285f4':'var(--border2)')+';'+

        'cursor:pointer;display:flex;align-items:center;gap:7px;justify-content:center">'+
        '<i class="ti ti-brand-google" style="font-size:14px"></i>'+
        (cfg?'Sign in with Google':'Configure Google sync')+

      (!cfg?'<div style="font-size:10px;color:var(--text3);margin-top:5px;text-align:center">Paste your Client ID to enable<br>cloud sync · Gmail · Calendar</div>':'')+

// ═══════════════════════════════ DATA PROTECTION ════════════════════════════════
// Auto-save to PC file + Email backup button
// ════════════════════════════════════════════════════════════════════════════════

let _fsHandle = null;
let _fsEnabled = false;
let _fsLastSave = null;
let _fsSaveCount = 0;
let _fsError = null;

const FS_SUPPORTS = typeof window !== 'undefined' && 'showSaveFilePicker' in window;

async function fsSetup() {
  if (!FS_SUPPORTS) {
    toast('Auto-save to PC requires Chrome 86+. Use Download Backup instead.', 'err');
    return;
  }
  try {
    _fsHandle = await window.showSaveFilePicker({
      suggestedName: _APP_LABEL + '_backup_' + TODAY + '.json',
      types: [{ description: 'AdvisorOS Backup', accept: { 'application/json': ['.json'] } }],
    });
    _fsEnabled = true; _fsError = null;
    await fsWrite();
    toast('Auto-save enabled — file updates on every change ✓');
    log('Auto-save to PC enabled: ' + _fsHandle.name);
    dpUpdateUI();
  } catch(e) {
    if (e.name !== 'AbortError') { _fsError = e.message; toast('Auto-save error: ' + e.message, 'err'); }
  }
}

async function fsWrite() {
  if (!_fsEnabled || !_fsHandle) return;
  try {
    const writable = await _fsHandle.createWritable();
    await writable.write(JSON.stringify(buildBackupPayload(), null, 2));
    await writable.close();
    _fsLastSave = new Date().toLocaleTimeString();
    _fsSaveCount++;
    _fsError = null;
    dpUpdateBadge();
  } catch(e) {
    _fsError = e.message;
    if (e.name === 'NotAllowedError') { _fsEnabled = false; _fsHandle = null; }
    dpUpdateBadge();
  }
}

const _dpOrigSave = save;
save = function() {
  _dpOrigSave();
  if (_fsEnabled) { clearTimeout(save._dpTimer); save._dpTimer = setTimeout(fsWrite, 800); }
  dpUpdateBadge();
};

function buildBackupPayload() {
  return {
    version: 3, app: _APP_LABEL, advisor: 'Manan Dua',
    exportedAt: new Date().toISOString(), exportedDate: TODAY,
    clients: S.clients||[], tasks: S.tasks||[], pipeline: S.pipeline||[],
    actLog: S.actLog||[], nextId: S.nextId||1,
  };
}

function dpDownloadBackup() {
  const json = JSON.stringify(buildBackupPayload(), null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  a.download = _APP_LABEL + '_backup_' + TODAY + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  log('Manual backup downloaded'); toast('Backup downloaded ✓');
  dpUpdateUI();
}

function dpEmailBackup(provider) {
  const data = buildBackupPayload();
  const json = JSON.stringify(data, null, 2);
  const subj = encodeURIComponent(_APP_LABEL + ' Data Backup — ' + TODAY);
  const intro = 'AdvisorOS data backup — ' + TODAY + '\n\n' +
    'Clients: ' + (data.clients.length) + ' | Tasks: ' + (data.tasks.length) + '\n\n' +
    'Backup data (paste into a .txt or .json file for safekeeping):\n\n';

  navigator.clipboard.writeText(json).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = json; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });

  const pasteNote = encodeURIComponent(intro + '[PASTE BACKUP JSON HERE — already copied to your clipboard]');

  if (provider === 'gmail') {
    window.open('https://mail.google.com/mail/u/0/?view=cm&fs=1&to=me&su=' + subj + '&body=' + pasteNote, '_blank');
  } else if (provider === 'outlook') {
    window.open('https://outlook.live.com/mail/0/deeplink/compose?subject=' + subj, '_blank');
  } else {
    window.location.href = 'mailto:?subject=' + subj + '&body=' + pasteNote;
  }
  toast('Backup JSON copied to clipboard — paste it into the email and send ✓');
  log('Email backup initiated: ' + provider);
}

function dpRestore() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.clients) { toast('Invalid backup file', 'err'); return; }
        if (!confirm('Replace ALL current data with this backup?\n\nBackup date: ' + (d.exportedDate||'unknown') + '\nClients: ' + (d.clients?.length||0) + '\n\nThis cannot be undone.')) return;
        if (d.clients)  S.clients  = d.clients;
        if (d.tasks)    S.tasks    = d.tasks;
        if (d.pipeline) S.pipeline = d.pipeline;
        if (d.actLog)   S.actLog   = d.actLog;
        S.nextId = Math.max(...(d.clients||[]).map(x=>x.id||0),...(d.tasks||[]).map(x=>x.id||0),S.nextId||1)+1;
        save(); log('Restored backup: ' + file.name); toast('Backup restored — ' + (d.clients?.length||0) + ' clients loaded ✓');
        render(); dpUpdateUI();
      } catch(err) { toast('Could not read backup: ' + err.message, 'err'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function dpUpdateBadge() {
  const el = document.getElementById('dp-badge'); if (!el) return;
  if (_fsEnabled && _fsLastSave) {

  } else if (_fsError) {
    el.textContent = '⚠ Save error'; el.style.color = 'var(--red)'; el.title = _fsError;
  } else {
    el.textContent = '○ Not saved to file'; el.style.color = 'var(--text3)';
    el.title = 'Enable auto-save to protect your data';
  }
}

// ── Field/filter toggle functions ─────────────────────────────────────────────
function ceToggleField(key, checked) {
  const p = ceLoadPrefs();
  if (checked) { if (!p.fields.includes(key)) p.fields.push(key); }
  else { p.fields = p.fields.filter(k=>k!==key); }
  ceSavePrefs(p); render();
}

function ceToggleClient(id, checked) {
  const p = ceLoadPrefs();
  if (!p.clients) p.clients = [];
  if (checked) { if (!p.clients.includes(id)) p.clients.push(id); }
  else { p.clients = p.clients.filter(x=>x!==id); }
  // If all selected, treat as "no individual filter"
  if (p.clients.length === S.clients.length) p.clients = [];
  ceSavePrefs(p); render();
}

function ceSetFilter(key, val) {
  const p = ceLoadPrefs(); p.filter[key] = val; ceSavePrefs(p); render();
}

function ceClearFilters() {
  const p = ceLoadPrefs(); p.filter = {status:'',segment:'',risk:''}; p.clients = []; ceSavePrefs(p); render();
}

function ceSelectAll() {
  const p = ceLoadPrefs();
  p.clients = p.clients && p.clients.length ? [] : S.clients.map(c=>c.id);
  ceSavePrefs(p); render();
}

function ceSelectAllFields() {
  const p = ceLoadPrefs(); p.fields = EXPORT_FIELDS.map(f=>f.k); ceSavePrefs(p); render();
}

function ceSelectEssentialFields() {
  const p = ceLoadPrefs();
  p.fields = ['name','phone','email','city','segment','risk','status','aum','sip','feeType','feeAmt','nextReview','kyc'];
  ceSavePrefs(p); render();
}

// ── Export engine ─────────────────────────────────────────────────────────────
function ceExport(format) {
  const p = ceLoadPrefs();
  const selFields = EXPORT_FIELDS.filter(f=>p.fields.includes(f.k));
  if (!selFields.length) { toast('Select at least one field to export', 'err'); return; }

  let clients = [...S.clients];
  if (p.filter.status)  clients = clients.filter(c=>c.status===p.filter.status);
  if (p.filter.segment) clients = clients.filter(c=>c.segment===p.filter.segment);
  if (p.filter.risk)    clients = clients.filter(c=>c.risk===p.filter.risk);
  if (p.clients && p.clients.length) clients = clients.filter(c=>p.clients.includes(c.id));

  if (!clients.length) { toast('No clients match the current filters', 'err'); return; }

  const headers = selFields.map(f=>f.l);
  const rows = clients.map(c=>selFields.map(f=>f.get(c)));

  if (format === 'csv') {
    const lines = [headers, ...rows].map(row =>
      row.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')
    ).join('\n');
    const blob = new Blob(['\uFEFF' + lines], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = _APP_LABEL + '_export_' + TODAY + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Exported ' + clients.length + ' clients to CSV ✓');
    log('Custom CSV export: ' + clients.length + ' clients, ' + selFields.length + ' fields');

  } else if (format === 'xlsx') {
    ceExportXLSX(headers, rows, clients.length, selFields.length);
  }
}

function ceExportXLSX(headers, rows, clientCount, fieldCount) {
  // Build a proper XLSX file using the Office Open XML format
  // We generate the XML directly — no external library needed
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // Convert column index to Excel letter (A, B, ... Z, AA, AB...)
  function colLetter(n) {
    let s = '';
    while (n >= 0) { s = String.fromCharCode(65 + (n%26)) + s; n = Math.floor(n/26) - 1; }
    return s;
  }

  // Build shared strings
  const strs = [];
  const strIdx = {};
  function si(v) {
    const s = String(v);
    if (strIdx[s] === undefined) { strIdx[s] = strs.length; strs.push(s); }
    return strIdx[s];
  }

  // Pre-index all strings
  headers.forEach(h => si(h));
  rows.forEach(row => row.forEach(v => { if (typeof v === 'string' || isNaN(Number(v))) si(v); }));

  // Build sheet XML
  const allRows = [headers, ...rows];
  let sheetXML = '<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  allRows.forEach((row, ri) => {
    sheetXML += `<row r="${ri+1}">`;
    row.forEach((v, ci) => {
      const ref = colLetter(ci) + (ri+1);
      const num = ri > 0 && typeof v === 'number';
      if (num) {
        sheetXML += `<c r="${ref}" t="n"><v>${v}</v></c>`;
      } else {
        sheetXML += `<c r="${ref}" t="s"><v>${si(v)}</v></c>`;
      }
    });
    sheetXML += '</row>';
  });
  sheetXML += '</sheetData></worksheet>';

  // Shared strings XML
  const ssXML = '<?xml version="1.0" encoding="UTF-8"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="'+strs.length+'" uniqueCount="'+strs.length+'">' +
    strs.map(s=>'<si><t xml:space="preserve">'+esc(s)+'</t></si>').join('') + '</sst>';

  // Workbook XML
  const wbXML = '<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Clients" sheetId="1" r:id="rId1"/></sheets></workbook>';

  // Relationships
  const wbRels = '<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/></Relationships>';

  const pkgRels = '<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';

  const contentTypes = '<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/></Types>';

  // Build ZIP using a minimal JS ZIP writer
  // We encode each part as UTF-8 bytes, then build a ZIP structure
  function strToU8(s) {
    return new TextEncoder().encode(s);
  }

  // Minimal ZIP builder
  function buildZip(files) {
    const parts = [];
    const dir = [];
    let offset = 0;

    files.forEach(({name, data}) => {
      const nameBytes = new TextEncoder().encode(name);
      const dataBytes = typeof data === 'string' ? strToU8(data) : data;
      const crc = crc32(dataBytes);

      // Local file header
      const lf = new Uint8Array(30 + nameBytes.length);
      const lfv = new DataView(lf.buffer);
      lfv.setUint32(0, 0x04034b50, true); // signature
      lfv.setUint16(4, 20, true);          // version needed
      lfv.setUint16(6, 0, true);           // flags
      lfv.setUint16(8, 0, true);           // compression (stored)
      lfv.setUint16(10, 0, true);          // mod time
      lfv.setUint16(12, 0, true);          // mod date
      lfv.setUint32(14, crc, true);        // CRC32
      lfv.setUint32(18, dataBytes.length, true); // compressed size
      lfv.setUint32(22, dataBytes.length, true); // uncompressed size
      lfv.setUint16(26, nameBytes.length, true);
      lfv.setUint16(28, 0, true);
      lf.set(nameBytes, 30);

      // Central directory entry
      const cd = new Uint8Array(46 + nameBytes.length);
      const cdv = new DataView(cd.buffer);
      cdv.setUint32(0, 0x02014b50, true);
      cdv.setUint16(4, 20, true);
      cdv.setUint16(6, 20, true);
      cdv.setUint16(8, 0, true);
      cdv.setUint16(10, 0, true);
      cdv.setUint16(12, 0, true);
      cdv.setUint16(14, 0, true);
      cdv.setUint32(16, crc, true);
      cdv.setUint32(20, dataBytes.length, true);
      cdv.setUint32(24, dataBytes.length, true);
      cdv.setUint16(28, nameBytes.length, true);
      cdv.setUint16(30, 0, true);
      cdv.setUint16(32, 0, true);
      cdv.setUint16(34, 0, true);
      cdv.setUint16(36, 0, true);
      cdv.setUint32(38, 0, true);
      cdv.setUint32(42, offset, true);
      cd.set(nameBytes, 46);

      dir.push(cd);
      parts.push(lf, dataBytes);
      offset += lf.length + dataBytes.length;
    });

    // End of central directory
    const cdSize = dir.reduce((a,d)=>a+d.length, 0);
    const eocd = new Uint8Array(22);
    const eocdv = new DataView(eocd.buffer);
    eocdv.setUint32(0, 0x06054b50, true);
    eocdv.setUint16(4, 0, true);
    eocdv.setUint16(6, 0, true);
    eocdv.setUint16(8, dir.length, true);
    eocdv.setUint16(10, dir.length, true);
    eocdv.setUint32(12, cdSize, true);
    eocdv.setUint32(16, offset, true);
    eocdv.setUint16(20, 0, true);

    const all = [...parts, ...dir, eocd];
    const total = all.reduce((a,b)=>a+b.length, 0);
    const out = new Uint8Array(total);
    let pos = 0;
    all.forEach(b => { out.set(b, pos); pos += b.length; });
    return out;
  }

  function crc32(buf) {
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < buf.length; i++) {
      crc ^= buf[i];
      for (let j = 0; j < 8; j++) {
        crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
      }
    }
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }

  const zipBytes = buildZip([
    { name: '[Content_Types].xml',          data: contentTypes },
    { name: '_rels/.rels',                  data: pkgRels },
    { name: 'xl/workbook.xml',              data: wbXML },
    { name: 'xl/_rels/workbook.xml.rels',   data: wbRels },
    { name: 'xl/worksheets/sheet1.xml',     data: sheetXML },
    { name: 'xl/sharedStrings.xml',         data: ssXML },
  ]);

  const blob = new Blob([zipBytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = _APP_LABEL + '_export_' + TODAY + '.xlsx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('Exported ' + clientCount + ' clients to Excel ✓');
  log('Custom Excel export: ' + clientCount + ' clients, ' + fieldCount + ' fields');
}
