<div id="pgGate" style="position:fixed;inset:0;z-index:9999;background:#1d2e28;display:flex;align-items:center;justify-content:center;font-family:'Inter',system-ui,sans-serif;">
  <div style="background:#faf8f3;border-radius:12px;padding:40px 36px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.35);">
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:600;color:#1d2e28;margin-bottom:6px;">Private access</div>
    <div style="font-size:12.5px;color:#8c8070;margin-bottom:20px;line-height:1.6;">This tool contains client data. Enter the password to continue.</div>
    <input type="password" id="pgInput" placeholder="Password" style="width:100%;padding:10px 12px;border:1px solid #d8d0c0;border-radius:6px;font-size:14px;margin-bottom:10px;box-sizing:border-box;" autocomplete="off">
    <div id="pgError" style="display:none;color:#b0453a;font-size:12px;margin-bottom:10px;">Incorrect password. Try again.</div>
    <button id="pgSubmit" style="width:100%;background:#2a4038;color:#fff;border:none;border-radius:6px;padding:11px;font-size:13.5px;font-weight:500;cursor:pointer;">Unlock</button>
  </div>
</div>
<script>
(function() {
  var PG_HASH = 'b893829a909d5eb9d7f41870268e05e07cedb728c8bbc06e06cebfed0daa4174'; // sha-256 of the password — change by generating a new hash
  var gate = document.getElementById('pgGate');
  var input = document.getElementById('pgInput');
  var err = document.getElementById('pgError');
  var btn = document.getElementById('pgSubmit');

  if (sessionStorage.getItem('pg_unlocked') === 'yes') {
    gate.style.display = 'none';
  }

  function sha256Hex(str) {
    var enc = new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256', enc).then(function(buf) {
      return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    });
  }

  function tryUnlock() {
    sha256Hex(input.value).then(function(hash) {
      if (hash === PG_HASH) {
        sessionStorage.setItem('pg_unlocked', 'yes');
        gate.style.display = 'none';
      } else {
        err.style.display = 'block';
        input.value = '';
        input.focus();
      }
    });
  }

  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') tryUnlock(); });
  setTimeout(function() { input.focus(); }, 100);
})();
</script>

<script>


const TODAY=new Date().toISOString().slice(0,10);
const _APP_LABEL='RIA_AdvisorOS';
let calM=new Date(TODAY).getMonth(),calY=new Date(TODAY).getFullYear();
let calSynced={google:false,outlook:false,apple:false};

let S={
  tab:'dashboard',sub:{},view:null,modal:null,editId:null,
  search:'',fStat:'',fSeg:'',fRisk:'',nextId:1,commDraft:'',
  compSnooze:{},compOverrides:{},
  clients:[],
  tasks:[],
  actLog:[]
};

function ts0(){const n=new Date();return n.toISOString().slice(0,10)+' '+n.toTimeString().slice(0,5)}
function escapeHtml(str){
  if(str===undefined||str===null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmt(n){return '₹'+Number(n).toLocaleString('en-IN')}
function fmtL(n){if(n>=10000000)return '₹'+(n/10000000).toFixed(2)+'Cr';return '₹'+(n/100000).toFixed(1)+'L'}
function ini(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function avcl(c){return {b:'av-b',g:'av-g',a:'av-a',r:'av-r',p:'av-p',t:'av-t'}[c]||'av-p'}
function isOD(due){return due&&due<TODAY}
function daysTo(due){if(!due)return null;return Math.round((new Date(due)-new Date(TODAY))/864e5)}
function newCol(){return ['b','g','a','r','p','t'][S.nextId%6]}
function log(msg){S.actLog.unshift({ts:ts0(),msg});if(S.actLog.length>200)S.actLog.pop();save()}
function save(){try{localStorage.setItem('ria_v2',JSON.stringify({clients:S.clients,tasks:S.tasks,actLog:S.actLog,nextId:S.nextId,compSnooze:S.compSnooze||{},compOverrides:S.compOverrides||{}}))}catch(e){}}
function load(){try{const d=localStorage.getItem('ria_v2');if(d){const p=JSON.parse(d);['clients','tasks','actLog','nextId','compSnooze','compOverrides'].forEach(k=>{if(p[k]!==undefined)S[k]=p[k]})}}catch(e){}}
function toast(msg,type='ok'){const el=document.getElementById('toast');document.getElementById('t-icon').className='ti ti-'+(type==='ok'?'check':type==='err'?'x':'info-circle');document.getElementById('t-msg').textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400)}
function rpExpired(c){if(!c.rpDate)return true;return(new Date(TODAY)-new Date(c.rpDate))/(864e5*365)>2}
function agExpired(c){if(!c.agDate)return true;return(new Date(TODAY)-new Date(c.agDate))/(864e5*365)>3}
function clientFee(c){return c.feeType==='flat'?c.feeAmt:c.feeType==='aum'?Math.round(c.aum*(c.feeAmt||0)/100):0}
function dueLabel(due,done){if(done)return 'done';const d=daysTo(due);if(d===null)return '—';if(d<0)return Math.abs(d)+'d overdue';if(d===0)return 'Today';if(d===1)return 'Tomorrow';return d+'d'}
function v(id){return(document.getElementById(id)?.value||'').trim()}
function num(id){return Number(document.getElementById(id)?.value)||0}
function empty(msg,icon='ti-inbox'){return `<div style="text-align:center;padding:22px;color:var(--text3)"><i class="ti ${icon}" style="font-size:24px;display:block;margin-bottom:6px;opacity:.4"></i>${msg}</div>`}
function mc(label,val,sub,icon,col){return `<div class="mc"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div class="ml">${label}</div><i class="ti ${icon}" style="font-size:16px;color:${col};opacity:.7"></i></div><div class="mv">${val}</div><div class="ms">${sub}</div></div>`}
function trowHtml(t){const od=isOD(t.due)&&!t.done;return `<div class="tr"><div class="tck${t.done?' done':''}" onclick="toggleT(${t.id})">${t.done?'✓':''}</div><div style="flex:1;min-width:0"><div style="font-size:12px;color:${t.done?'var(--text3)':'var(--text)'}${t.done?';text-decoration:line-through':''};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(t.title)}</div><div style="font-size:10px;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap"><span class="bdg b-${t.type==='Compliance'?'rev':t.type==='Advisory'?'pu':t.type==='Fee'?'te':t.type==='Review'?'act':'cld'}">${escapeHtml(t.type)}</span>${t.client?`<span style="color:var(--text3)">${escapeHtml(t.client)}</span>`:''}<span style="color:${od?'var(--red)':'var(--text3)'}">${dueLabel(t.due,t.done)}</span></div></div><span class="bdg b-${t.priority}" style="flex-shrink:0">${escapeHtml(t.priority)}</span></div>`}

  {g:'Advisory CRM',items:[{k:'clients',ic:'ti-users',l:'Clients'},{k:'insurance',ic:'ti-shield',l:'Insurance Tracker'}]},
  {g:'Work',items:[{k:'tasks',ic:'ti-checkbox',l:'Tasks'},{k:'calendar',ic:'ti-calendar',l:'Calendar'},{k:'communication',ic:'ti-message',l:'Communication Hub'}]},

];

function render(){renderSB();renderTB();document.getElementById('page').innerHTML=buildPage();renderModal()}
function renderSB(){
  const od=S.tasks.filter(t=>!t.done&&isOD(t.due)).length;

}

const TB_INFO={dashboard:{t:'RIA Dashboard',s:'SEBI Investment Adviser Practice Overview'},clients:{t:'Advisory Clients',s:'Client relationships under SEBI IA Regulations 2013'},insurance:{t:'Insurance Tracker',s:'Coverage gaps, renewals and adequacy'},tasks:{t:'Tasks & Follow-ups',s:'Action items sorted by priority'},calendar:{t:'Calendar',s:'Reviews, compliance dates and fee deadlines'},communication:{t:'Communication Hub',s:'14 RIA-specific email and WhatsApp templates'},compliance:{t:'SEBI Compliance Tracker',s:'Investment Adviser Regulations obligations'},fees:{t:'Fee Management',s:'Advisory fee schedule and invoice generator'},documents:{t:'Document Register',s:'KYC, risk profiles, agreements, IPS — client-wise'},ilog:{t:'Interaction Log',s:'SEBI-mandated record of all client interactions'},reports:{t:'Reports & Export',s:'AUM analytics, fee revenue and data export'},activity:{t:'Activity Log',s:'Full audit trail of CRM actions'},'ce-export':{t:'Custom Export',s:'Select fields and clients to export — CSV or Excel'}};

const TB_ACTIONS={clients:`<button class="btn bp bsm" onclick="openM('addClient')"><i class="ti ti-plus"></i> Add client</button>`,tasks:`<button class="btn bp bsm" onclick="openM('addTask','')"><i class="ti ti-plus"></i> Add task</button>`,fees:`<button class="btn bp bsm" onclick="openM('feeInvoice')"><i class="ti ti-receipt"></i> Generate invoice</button>`,reports:`<button class="btn bs bsm" onclick="expCSV()"><i class="ti ti-download"></i> Export</button><button class="btn bs bsm" onclick="backup()"><i class="ti ti-database-export"></i> Backup</button><button class="btn bs bsm" onclick="restore()"><i class="ti ti-database-import"></i> Restore</button>`};

function renderTB(){const p=TB_INFO[S.tab]||{t:'',s:''};document.getElementById('tb').innerHTML=`<div class="tb-l"><div class="tb-bar"></div><div><div class="tb-title">${p.t}</div><div class="tb-sub">${p.s}</div></div></div><div class="tb-r">${TB_ACTIONS[S.tab]||''}</div>`}

function buildPage(){
  if(S.tab==='dashboard')return pgDash();
  if(S.tab==='clients')return S.view?pgDetail(S.view):pgClients();
  if(S.tab==='insurance')return pgInsurance();
  if(S.tab==='tasks')return pgTasks();
  if(S.tab==='calendar')return pgCalendar();
  if(S.tab==='communication')return pgComm();
  if(S.tab==='compliance')return pgCompliance();
  if(S.tab==='fees')return pgFees();
  if(S.tab==='documents')return pgDocuments();
  if(S.tab==='ilog')return pgILog();
  if(S.tab==='reports')return pgReports();
  if(S.tab==='activity')return pgActivity();
  if(S.tab==='ce-export')return pgCustomExport();
  return '';
}

// DASHBOARD
function pgDash(){
  const totalAUM=S.clients.reduce((a,c)=>a+c.aum,0);
  const totalSIP=S.clients.reduce((a,c)=>a+c.sip,0);
  const totalFee=S.clients.reduce((a,c)=>a+clientFee(c),0);
  const odT=S.tasks.filter(t=>!t.done&&isOD(t.due)).length;
  const openT=S.tasks.filter(t=>!t.done).length;
  const pendKYC=S.clients.filter(c=>c.kyc==='pending').length;
  const expRP=S.clients.filter(c=>rpExpired(c)).length;
  const expAg=S.clients.filter(c=>agExpired(c)).length;
  const checks=buildChecks();const ok=checks.filter(c=>c.ok).length;const pct=Math.round(ok/checks.length*100);
  const sipAlerts=getSIPAlerts();
  let notices='';
  if(odT)notices+=`<div class="ntc nd"><i class="ti ti-alert-triangle"></i>${odT} overdue task${odT>1?'s':''}</div>`;
  if(expRP)notices+=`<div class="ntc nw"><i class="ti ti-clipboard-list"></i>${expRP} risk profile${expRP>1?'s':''} expired >2 years — SEBI re-profiling required</div>`;
  if(pendKYC)notices+=`<div class="ntc nw"><i class="ti ti-id-badge"></i>${pendKYC} client KYC pending</div>`;
  if(expAg)notices+=`<div class="ntc ni2"><i class="ti ti-file-x"></i>${expAg} client agreement${expAg>1?'s':''} older than 3 years — renewal needed</div>`;
  return `${notices}<div class="g5">${mc('AUM Under Advice',fmtL(totalAUM),S.clients.length+' advisory clients','ti-trending-up','var(--accent)')}${mc('Monthly SIP Book',fmt(totalSIP),'Recurring advisory','ti-refresh','var(--green)')}${mc('Annual Advisory Fees',fmtL(totalFee),'Estimated total','ti-receipt','var(--teal)')}${mc('Open Tasks',openT,odT+' overdue','ti-checkbox',odT?'var(--red)':'var(--text3)')}${mc('SEBI Score',pct+'%',ok+'/'+checks.length+' OK','ti-shield-check',pct>80?'var(--green)':pct>60?'var(--amber)':'var(--red)')}</div>
  <div class="g2"><div>
    <div class="card"><div class="sec">Upcoming tasks</div>${S.tasks.filter(t=>!t.done).sort((a,b)=>a.due<b.due?-1:1).slice(0,5).map(t=>trowHtml(t)).join('')||empty('All tasks complete!','ti-circle-check')}</div>
    <div class="card"><div class="sec">Pending reviews</div>${S.clients.filter(c=>c.status==='review').map(c=>`<div class="row" onclick="openC(${c.id})"><div class="av ${avcl(c.color)}">${escapeHtml(ini(c.name))}</div><div style="flex:1"><div class="rn">${escapeHtml(c.name)}</div><div class="rs">Due ${c.nextReview} · ${fmtL(c.aum)}</div></div><span class="bdg b-rev">review</span></div>`).join('')||empty('No reviews pending','ti-circle-check')}</div>

  </div><div>
    <div class="card"><div class="sec">SEBI compliance snapshot</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><div style="font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${pct>80?'var(--green)':pct>60?'var(--amber)':'var(--red)'}">${pct}%</div><div style="flex:1"><div class="pw"><div class="pf" style="width:${pct}%;background:${pct>80?'var(--green)':pct>60?'var(--amber)':'var(--red)'}"></div></div><div style="font-size:11px;color:var(--text3);margin-top:4px">${ok}/${checks.length} compliant · ${checks.length-ok} need action</div></div></div>
      ${checks.filter(c=>!c.ok).slice(0,5).map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)"><i class="ti ti-alert-circle" style="color:${c.sev==='high'?'var(--red)':'var(--amber)'};font-size:14px;flex-shrink:0"></i><span style="font-size:12px;color:var(--text2);flex:1">${c.label}</span><span class="bdg b-${c.sev==='high'?'err':'md'}">${c.sev}</span></div>`).join('')}
      <div style="margin-top:8px"><span style="font-size:11px;color:var(--accent);cursor:pointer;font-weight:500" onclick="sw('compliance')">View full checklist →</span></div>
    </div>
    <div class="card"><div class="sec">Fee summary</div>${S.clients.filter(c=>c.feeType).map(c=>`<div class="row" onclick="openC(${c.id})"><div class="av ${avcl(c.color)}">${escapeHtml(ini(c.name))}</div><div style="flex:1"><div class="rn">${escapeHtml(c.name)}</div><div class="rs">${c.feeType==='flat'?'Flat fee':'AUM-based'} · ${c.feeFreq||'—'}</div></div><span style="font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--teal)">${fmt(clientFee(c))}</span></div>`).join('')||empty('No fee records','ti-receipt')}</div>
  </div></div>`;
}

function getSIPAlerts(){const today=new Date(TODAY),res=[];S.clients.forEach(c=>{if(!c.sipDue)return;const d=new Date(today.getFullYear(),today.getMonth(),c.sipDue);const diff=Math.round((d-today)/864e5);if(diff>=0&&diff<=7)res.push({c,dueStr:d.toISOString().slice(0,10),label:diff===0?'Today':diff+'d'});else if(diff<0&&diff>=-2)res.push({c,dueStr:d.toISOString().slice(0,10),label:'Missed'})});return res}

// CLIENTS
function pgClients(){
  let list=[...S.clients];
  if(S.search)list=list.filter(c=>[c.name,c.email,c.phone,c.city||''].join(' ').toLowerCase().includes(S.search.toLowerCase()));
  if(S.fStat)list=list.filter(c=>c.status===S.fStat);
  if(S.fSeg)list=list.filter(c=>c.segment===S.fSeg);
  if(S.fRisk)list=list.filter(c=>c.risk===S.fRisk);
  return `<div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap"><input style="flex:1;min-width:150px" placeholder="Search name, email, phone, city…" value="${escapeHtml(S.search)}" oninput="SS('search',this.value)"><select style="width:110px" onchange="SS('fStat',this.value)"><option value="">All status</option>${['active','review','prospect','cold'].map(s=>`<option${S.fStat===s?' selected':''}>${s}</option>`).join('')}</select><select style="width:110px" onchange="SS('fSeg',this.value)"><option value="">All segments</option>${['Retail','HNI','UHNI'].map(s=>`<option${S.fSeg===s?' selected':''}>${s}</option>`).join('')}</select><select style="width:110px" onchange="SS('fRisk',this.value)"><option value="">All risk</option>${['conservative','moderate','aggressive'].map(s=>`<option${S.fRisk===s?' selected':''}>${s}</option>`).join('')}</select>${S.search||S.fStat||S.fSeg||S.fRisk?`<button class="btn bg- bsm" onclick="clearF()"><i class="ti ti-x"></i></button>`:''}</div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:9px">${list.length} clients · ${fmtL(list.reduce((a,c)=>a+c.aum,0))} AUM</div>
  <div class="card">${list.length?list.map(c=>`<div class="row" onclick="openC(${c.id})"><div class="av ${avcl(c.color)}">${escapeHtml(ini(c.name))}</div><div style="flex:1;min-width:0"><div class="rn">${escapeHtml(c.name)} ${c.kyc==='pending'?'<span class="bdg b-err" style="font-size:9px">KYC</span>':''} ${rpExpired(c)?'<span class="bdg b-md" style="font-size:9px">RP exp</span>':''} ${agExpired(c)?'<span class="bdg b-md" style="font-size:9px">Ag exp</span>':''}</div><div class="rs">${escapeHtml(c.segment)} · ${escapeHtml(c.city||'')} · ${fmtL(c.aum)} · SIP ${fmt(c.sip)}/mo · ${escapeHtml(c.source||'—')}</div></div><div style="text-align:right;flex-shrink:0"><span class="bdg b-${c.status}">${escapeHtml(c.status)}</span><div class="rs" style="margin-top:3px">Review: ${escapeHtml(c.nextReview||'—')}</div></div><i class="ti ti-chevron-right" style="color:var(--text3);flex-shrink:0"></i></div>`).join(''):empty('No clients match filters')}</div>`;
}

function pgDetail(id){
  const c=S.clients.find(x=>x.id===id);if(!c)return empty('Not found');
  const cT=S.tasks.filter(t=>t.client===c.name&&!t.done);
  const dT=S.tasks.filter(t=>t.client===c.name&&t.done);
  const rv=daysTo(c.nextReview);const rvL=rv===null?'—':rv<0?Math.abs(rv)+'d overdue':rv===0?'Today':rv+'d';
  const fee=clientFee(c);

  const insHtml=(c.insurance||[]).map(ins=>{const d=daysTo(ins.renewal);return `<div style="padding:7px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:500">${ins.type} · ${ins.insurer}</span><span class="bdg ${d!==null&&d<=30?'b-err':d!==null&&d<=90?'b-md':'b-act'}">${d!==null&&d<=30?'Renew soon':'Active'}</span></div><div style="font-size:11px;color:var(--text3);margin-top:2px">Cover: ${fmt(ins.cover)} · Premium: ${fmt(ins.premium)}/yr · Renewal: ${ins.renewal||'—'}</div></div>`}).join('')||'<div style="font-size:12px;color:var(--text3)">No insurance records</div>';
  return `<div style="display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <button class="btn bs bsm" onclick="closeD()"><i class="ti ti-arrow-left"></i> Clients</button>
    <button class="btn bs bsm" onclick="openM('editClient',${c.id})"><i class="ti ti-edit"></i> Edit</button>
    <button class="btn bs bsm" onclick="openM('addInteraction',${c.id})"><i class="ti ti-message-plus"></i> Log interaction</button>
    <button class="btn bs bsm" onclick="openM('addTask','${escapeHtml(c.name)}')"><i class="ti ti-plus"></i> Add task</button>
    <button class="btn bs bsm" onclick="openM('draftComm',${c.id})"><i class="ti ti-mail"></i> Draft message</button>
    <button class="btn bd bsm mla" onclick="delClient(${c.id})"><i class="ti ti-trash"></i> Delete</button>
  </div>
  <div class="g2"><div>
    <div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:13px"><div class="av ${avcl(c.color)}" style="width:46px;height:46px;font-size:15px;border-radius:50%;flex-shrink:0">${escapeHtml(ini(c.name))}</div><div style="flex:1"><div style="font-size:17px;font-weight:700;color:var(--text)">${escapeHtml(c.name)}</div><div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap"><span class="bdg b-${c.status}">${c.status}</span><span class="tag">${c.segment}</span><span class="tag">${c.risk} risk</span><span class="tag">${c.resStatus||'RI'}</span><span class="bdg ${c.kyc==='done'?'b-act':'b-err'}">${c.kyc==='done'?'✓ KYC':'⚠ KYC pending'}</span>${rpExpired(c)?'<span class="bdg b-md">RP expired</span>':''}<span class="bdg ${c.dpdpaConsent?'b-act':'b-md'}">${c.dpdpaConsent?'✓ DPDPA consent '+c.dpdpaConsent.date:'⚠ DPDPA consent missing'}</span>${agExpired(c)?'<span class="bdg b-md">Ag expired</span>':''}</div></div></div>
    <div class="g2" style="margin-bottom:8px"><div class="mc" style="padding:10px"><div class="ml">AUM Under Advice</div><div class="mv" style="font-size:18px">${fmtL(c.aum)}</div></div><div class="mc" style="padding:10px"><div class="ml">Monthly SIP</div><div class="mv" style="font-size:18px">${fmt(c.sip)}</div><div class="ms">Due: ${c.sipDue?c.sipDue+'th':'—'}</div></div></div>
    <div class="g2" style="margin-bottom:0"><div class="mc" style="padding:10px"><div class="ml">Next Review</div><div style="font-size:13px;font-weight:600;color:${rv!==null&&rv<0?'var(--red)':'var(--text)'};font-family:'JetBrains Mono',monospace">${c.nextReview||'—'}</div><div class="ms" style="color:${rv!==null&&rv<0?'var(--red)':'var(--text3)'}">${rvL}</div></div><div class="mc" style="padding:10px"><div class="ml">Advisory Fee</div><div style="font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--teal)">${fee?fmt(fee):'—'}</div><div class="ms">${c.feeType==='flat'?'Flat fee':c.feeType==='aum'?c.feeAmt+'% AUM':'Not set'} · ${c.feeFreq||''}</div></div></div></div>
    <div class="card"><div class="sec">Contact & KYC</div><div style="display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:12px;align-items:center;color:var(--text2)"><i class="ti ti-phone" style="color:var(--text3)"></i><span>${escapeHtml(c.phone||'—')}</span><i class="ti ti-mail" style="color:var(--text3)"></i><span>${escapeHtml(c.email||'—')}</span><i class="ti ti-map-pin" style="color:var(--text3)"></i><span>${escapeHtml(c.city||'—')}</span><i class="ti ti-cake" style="color:var(--text3)"></i><span>${escapeHtml(c.dob||'—')}</span><i class="ti ti-id-badge" style="color:var(--text3)"></i><span style="font-family:'JetBrains Mono',monospace">${escapeHtml(c.pan||'—')}</span>${c.driveFolder?`<i class="ti ti-brand-google-drive" style="color:#0f9d58"></i><a href="${encodeURI(c.driveFolder)}" target="_blank" style="color:var(--accent);font-size:12px">Open client Drive folder</a>`:''}<i class="ti ti-file-text" style="color:var(--text3)"></i><span>RP: ${escapeHtml(c.rpDate||'—')} ${rpExpired(c)?'<span class="bdg b-err" style="font-size:9px">Expired</span>':''}</span><i class="ti ti-file-certificate" style="color:var(--text3)"></i><span>Agreement: ${escapeHtml(c.agDate||'—')} ${agExpired(c)?'<span class="bdg b-err" style="font-size:9px">Expired</span>':''}</span></div><div class="sec">Notes</div><div style="font-size:12px;color:var(--text2);line-height:1.7">${escapeHtml(c.notes||'—')}</div></div>

  </div><div>

    <div class="card"><div class="sec" style="display:flex;align-items:center;justify-content:space-between"><span>Tasks (${cT.length} open)</span><span style="font-size:10px;color:var(--accent);cursor:pointer;text-transform:none;font-weight:500;letter-spacing:0" onclick="openM('addTask','${escapeHtml(c.name)}')">+ Add</span></div>${cT.length?cT.map(t=>trowHtml(t)).join(''):empty('No open tasks','ti-circle-check')}${dT.length?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><div style="font-size:10px;color:var(--text3);margin-bottom:5px">${dT.length} completed</div>${dT.map(t=>trowHtml(t)).join('')}</div>`:''}</div>

  </div></div>`;
}


// INSURANCE
function pgInsurance(){

// TASKS
function pgTasks(){
  const open=S.tasks.filter(t=>!t.done).sort((a,b)=>{const pr={high:0,medium:1,low:2};return pr[a.priority]!==pr[b.priority]?pr[a.priority]-pr[b.priority]:a.due<b.due?-1:1});
  const done=S.tasks.filter(t=>t.done);
  const od=open.filter(t=>isOD(t.due)).length,td=open.filter(t=>t.due===TODAY).length;
  return `<div class="g3" style="margin-bottom:13px">${mc('Open',open.length,'tasks','ti-list','var(--text2)')}${mc('Overdue',od,'need attention','.ti-alert-circle',od?'var(--red)':'var(--text2)')}${mc('Due today',td,'','.ti-calendar-due',td?'var(--amber)':'var(--text2)')}</div>

// CALENDAR
function pgCalendar(){
  const mN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const first=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate(),dipm=new Date(calY,calM,0).getDate();
  const evMap={};
  function addEv(date,label,cls){if(!evMap[date])evMap[date]=[];evMap[date].push({label,cls})}
  S.clients.forEach(c=>{if(c.nextReview)addEv(c.nextReview,c.name.split(' ')[0]+' review','ce-rv');if(c.sipDue){const d=String(c.sipDue).padStart(2,'0');const mn=String(calM+1).padStart(2,'0');addEv(`${calY}-${mn}-${d}`,c.name.split(' ')[0]+' SIP due','ce-fe')}});
  S.tasks.filter(t=>!t.done).forEach(t=>{if(t.due)addEv(t.due,t.title.slice(0,16)+'…',t.type==='Compliance'?'ce-cp':t.type==='Fee'?'ce-fe':t.type==='Review'?'ce-rv':t.type==='Advisory'?'ce-mt':'ce-tk')});
  let cells='',day=1,nd=1;const tc=Math.ceil((first+dim)/7)*7;
  for(let i=0;i<tc;i++){let ds='',num,om=false;if(i<first){num=dipm-first+i+1;om=true;ds=`${calY}-${String(calM).padStart(2,'0')}-${String(num).padStart(2,'0')}`}else if(day<=dim){num=day;ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(num).padStart(2,'0')}`;day++}else{num=nd++;om=true;ds=`${calY}-${String(calM+2).padStart(2,'0')}-${String(num).padStart(2,'0')}`}
  const isT=ds===TODAY;const evs=evMap[ds]||[];cells+=`<div class="cal-day${isT?' today':''}${om?' om':''}"><div class="cal-dn">${num}</div>${evs.slice(0,3).map(e=>`<div class="ce ${e.cls}" title="${e.label}">${e.label}</div>`).join('')}${evs.length>3?`<div style="font-size:9px;color:var(--text3)">+${evs.length-3}</div>`:''}</div>`}
  const upcoming=[];Object.entries(evMap).filter(([d])=>d>=TODAY).sort(([a],[b])=>a>b?1:-1).slice(0,10).forEach(([d,evs])=>evs.forEach(e=>upcoming.push({date:d,...e})));
  const syncSection=`<div class="card"><div class="sec">Sync with external calendar</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Export review deadlines, SEBI compliance dates, SIP reminders and fee invoices to your preferred calendar.</div>
    <div style="display:flex;flex-direction:column;gap:0"><button class="sync-btn google" onclick="(typeof G!=='undefined'&&G.ok)?gSyncCal():syncCal('google')"><i class="ti ti-brand-google" style="font-size:16px"></i> Google Calendar</button><button class="sync-btn outlook" onclick="syncCal('outlook')"><i class="ti ti-brand-windows" style="font-size:16px"></i> Outlook / Microsoft 365</button><button class="sync-btn apple" onclick="syncCal('apple')"><i class="ti ti-brand-apple" style="font-size:16px"></i> Apple Calendar (macOS/iOS)</button><button class="sync-btn ical" onclick="syncCal('ical')"><i class="ti ti-calendar-down" style="font-size:16px"></i> Download .ics file</button></div>
    ${calSynced.google?`<div class="sync-ok"><i class="ti ti-circle-check"></i>Synced with Google Calendar · ${TODAY}</div>`:''}${calSynced.outlook?`<div class="sync-ok"><i class="ti ti-circle-check"></i>Synced with Outlook · ${TODAY}</div>`:''}${calSynced.apple?`<div class="sync-ok"><i class="ti ti-circle-check"></i>Exported to Apple Calendar · ${TODAY}</div>`:''}
    <div style="font-size:11px;color:var(--text3);margin-top:8px"><i class="ti ti-info-circle"></i> Events included: client reviews, SIP due dates, task deadlines, SEBI compliance dates, fee invoice dates</div>
  </div>`;
  return `<div class="g2"><div>
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:11px"><button class="btn bs bsm" onclick="calP()"><i class="ti ti-chevron-left"></i></button><span style="font-size:14px;font-weight:600;color:var(--text)">${mN[calM]} ${calY}</span><button class="btn bs bsm" onclick="calN()"><i class="ti ti-chevron-right"></i></button><button class="btn bg- bsm" onclick="calT()">Today</button></div>
    <div class="cal-grid">${days.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}${cells}</div>
  </div><div>
    ${syncSection}
    <div class="card"><div class="sec">Upcoming events</div>${upcoming.length?upcoming.map(e=>`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="width:36px;text-align:center;background:var(--bg2);border-radius:var(--r);padding:3px;flex-shrink:0"><div style="font-size:15px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace">${e.date.slice(8)}</div><div style="font-size:9px;color:var(--text3)">${mN[parseInt(e.date.slice(5,7))-1].slice(0,3)}</div></div><div class="ce ${e.cls}" style="display:inline-block">${e.label}</div></div>`).join(''):empty('No upcoming events','ti-calendar')}
    <div class="sec" style="margin-top:12px">Legend</div>${[['ce-rv','Client reviews'],['ce-fe','Fee/SIP dates'],['ce-tk','Tasks'],['ce-cp','Compliance deadlines'],['ce-mt','Advisory meetings']].map(([cls,l])=>`<div style="display:flex;align-items:center;gap:7px;padding:3px 0"><div class="ce ${cls}" style="padding:2px 8px">${l}</div></div>`).join('')}</div>
  </div></div>`;
}

function syncCal(type){
  const events=[];
  S.clients.forEach(c=>{if(c.nextReview)events.push({date:c.nextReview,summary:`Advisory Review — ${escapeHtml(c.name)}`,desc:`Annual portfolio review. AUM: ${fmtL(c.aum)}`})});
  S.tasks.filter(t=>!t.done).forEach(t=>{if(t.due)events.push({date:t.due,summary:`[${t.type}] ${t.title}`,desc:t.client?`Client: ${t.client}`:''})});
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//RIA AdvisorOS//Manan Dua//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  events.filter(e=>e.date).forEach(e=>{const dt=e.date.replace(/-/g,'');ics.push('BEGIN:VEVENT',`DTSTART;VALUE=DATE:${dt}`,`DTEND;VALUE=DATE:${dt}`,`SUMMARY:${icsEscape(e.summary)}`,`DESCRIPTION:${icsEscape(e.desc||'')}`,`UID:${dt}-${Math.random().toString(36).slice(2)}@ria-advisoros`,'END:VEVENT')});
  ics.push('END:VCALENDAR');
  const blob=new Blob([ics.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='ria_advisoros_calendar.ics';a.click();
  if(type==='google'){window.open('https://calendar.google.com/calendar/r/settings/export','_blank');calSynced.google=true;toast('Download the .ics file and import into Google Calendar','info')}
  else if(type==='outlook'){window.open('https://outlook.live.com/calendar/0/importcalendar','_blank');calSynced.outlook=true;toast('Download the .ics file and import into Outlook','info')}
  else if(type==='apple'){calSynced.apple=true;toast('Open the downloaded .ics file — Apple Calendar will import it automatically')}
  else{toast('Calendar file downloaded — import into any calendar app')}
  log('Calendar exported for sync: '+type);render();
}
function calP(){calM--;if(calM<0){calM=11;calY--}render()}
function calN(){calM++;if(calM>11){calM=0;calY++}render()}
function calT(){calM=new Date(TODAY).getMonth();calY=new Date(TODAY).getFullYear();render()}

function useTpl(id){const t=TPLS.find(x=>x.id===id);if(!t)return;S.commDraft=t.body;render();setTimeout(()=>{const el=document.getElementById('cc-bo');if(el)el.scrollIntoView({behavior:'smooth'})},80)}

function autoFill(){
  const cid=document.getElementById('cc-cl')?.value;const c=S.clients.find(x=>x.id==cid);
  let d=document.getElementById('cc-bo')?.value||'';if(!d){setNote('Select a template first.');return}
  if(c){const fee=clientFee(c);const gst=Math.round(fee*0.18);
    d=d.replace(/\[CLIENT_NAME\]/g,c.name).replace(/\[AUM\]/g,(c.aum||0).toLocaleString('en-IN')).replace(/\[SIP\]/g,(c.sip||0).toLocaleString('en-IN')).replace(/\[RISK_PROFILE\]/g,c.risk||'—').replace(/\[RP_DATE\]/g,c.rpDate||'—').replace(/\[AG_DATE\]/g,c.agDate||'—').replace(/\[REVIEW_DATE\]/g,c.nextReview||'—').replace(/\[DATE\]/g,TODAY).replace(/\[FEE_TYPE\]/g,c.feeType==='flat'?'Flat Advisory Fee':'AUM-based Advisory Fee ('+c.feeAmt+'%)').replace(/\[FEE_AMOUNT\]/g,fee.toLocaleString('en-IN')).replace(/\[FEE_FREQ\]/g,c.feeFreq||'—').replace(/\[GST_AMOUNT\]/g,gst.toLocaleString('en-IN')).replace(/\[TOTAL_AMOUNT\]/g,(fee+gst).toLocaleString('en-IN'));
    document.getElementById('cc-bo').value=d;S.commDraft=d;setNote('✓ Personalised for '+c.name);
  } else {setNote('Select a client to personalise.')}
}

function daysUntilDue(due){ if(!due) return null; return daysTo(due); }

function pgCompliance(){
  const checks=buildChecks();const ok=checks.filter(c=>c.ok).length;const pct=Math.round(ok/checks.length*100);
  const col=pct>80?'var(--green)':pct>60?'var(--amber)':'var(--red)';
  const cats=[...new Set(checks.map(c=>c.cat))];const st=S.sub.comp||'all';
  let vis=st==='all'?checks:checks.filter(c=>c.cat===st);
  vis=[...vis].sort((a,b)=>{
    if(a.ok!==b.ok) return a.ok?1:-1;
    const da=daysUntilDue(a.due), db=daysUntilDue(b.due);
    if(da!==null&&db!==null) return da-db;
    if(da!==null) return -1;
    if(db!==null) return 1;
    const sevOrder={high:0,medium:1,low:2};
    return (sevOrder[a.sev]||1)-(sevOrder[b.sev]||1);
  });
  const overdueCount = checks.filter(c=>!c.ok&&c.due&&isOD(c.due)).length;
  const dueSoonCount = checks.filter(c=>!c.ok&&c.due&&!isOD(c.due)&&daysUntilDue(c.due)<=7).length;

  return `<div class="g4">${mc('SEBI Compliance Score',pct+'%',ok+'/'+checks.length+' compliant','ti-shield-check',col)}
  ${mc('Overdue',overdueCount,'past deadline','ti-alert-triangle',overdueCount?'var(--red)':'var(--text2)')}
  ${mc('Due within 7 days',dueSoonCount,'act now','ti-clock-exclamation',dueSoonCount?'var(--amber)':'var(--text2)')}
  ${mc('Action needed',checks.filter(c=>!c.ok).length,'items require attention','ti-alert-circle',checks.filter(c=>!c.ok).length?'var(--red)':'var(--green)')}</div>
  <div style="margin-bottom:11px"><div class="pw" style="height:6px"><div class="pf" style="width:${pct}%;background:${col};height:6px"></div></div></div>
  ${overdueCount?`<div class="ntc nd" style="margin-bottom:11px"><i class="ti ti-alert-triangle"></i>${overdueCount} compliance item${overdueCount>1?'s are':' is'} past deadline — resolve immediately to avoid regulatory exposure</div>`:''}

    const dDays=daysUntilDue(c.due);

      <i class="ti ti-${c.ok?'circle-check':'alert-circle'}" style="font-size:17px;color:${c.ok?'var(--green)':c.sev==='high'?'var(--red)':'var(--amber)'};flex-shrink:0;margin-top:1px"></i>
      <div style="flex:1;min-width:0">

          ${c.label}
          <span class="bdg b-${c.cat==='SEBI'?'rev':'pu'}" style="font-size:9px">${c.cat}</span>
          ${dueLabel2?`<span class="bdg ${dueBadgeCls}" style="font-size:9px"><i class="ti ti-clock" style="font-size:9px"></i> ${dueLabel2}</span>`:''}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${escapeHtml(c.note)}</div>
        ${!c.ok?`<div style="font-size:11px;color:${c.sev==='high'?'var(--red)':'var(--amber)'};margin-top:2px">⚠ ${escapeHtml(c.val)}</div>`:''}

          :c.solo?`<button class="btn bp bsm" onclick="event.stopPropagation();createSoloComplianceTask('${c.id}')"><i class="ti ti-plus"></i> Create task</button>`:''}
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
        ${compTaskExists(c.taskTitle)?`<button class="btn bte bsm" onclick="event.stopPropagation();compGoToTask('${c.taskTitle}')"><i class="ti ti-arrow-right"></i> View open task</button>`:''}
        ${!c.ok&&!((S.compOverrides||{})[c.id])?`<button class="btn bg- bsm" onclick="event.stopPropagation();markCompDone('${c.id}')" style="border:1px solid var(--green);color:var(--green)"><i class="ti ti-circle-check"></i> Mark as done</button>`:c.ok&&(S.compOverrides||{})[c.id]?`<button class="btn bg- bsm" onclick="event.stopPropagation();clearCompDone('${c.id}')" style="font-size:10px;color:var(--text3)"><i class="ti ti-x"></i> Clear override</button>`:''}

  }).join('')}</div>`;

function toggleCompItem(id){ S.sub.compOpen = S.sub.compOpen===id ? null : id; render(); }

function createComplianceTasks(checkId){
  const checks=buildChecks();
  const item=checks.find(c=>c.id===checkId);
  if(!item||!item.affected||!item.affected.length) return;
  let created=0;
  item.affected.forEach(cl=>{
    const exists=S.tasks.some(t=>!t.done&&t.client===cl.name&&t.title.includes(item.taskTitle.trim()));
    if(exists) return;
    S.tasks.push({ id:S.nextId++, title:(item.taskTitle+' '+cl.name).trim(), due:item.due||addBizDays(TODAY,5), priority:item.sev==='high'?'high':'medium', type:item.taskType||'Compliance', client:cl.name, done:false });
    created++;
  });
  if(created){ log('Created '+created+' compliance task(s) for: '+item.label); save(); toast(created+' task'+(created>1?'s':'')+' created'); }
  else toast('Tasks already exist for these clients','info');
  render();
}

function createSoloComplianceTask(checkId){
  const checks=buildChecks();
  const item=checks.find(c=>c.id===checkId);
  if(!item) return;
  const exists=S.tasks.some(t=>!t.done&&t.title===item.taskTitle);
  if(exists){ toast('Task already exists','info'); return; }
  S.tasks.push({ id:S.nextId++, title:item.taskTitle, due:item.due||addBizDays(TODAY,14), priority:item.sev==='high'?'high':'medium', type:item.taskType||'Compliance', client:'', done:false });
  log('Created compliance task: '+item.taskTitle); save(); toast('Task created'); render();
}

function pgFees(){

function genInv(){
  const cid=v('fi-cl');const c=S.clients.find(x=>x.id==cid);if(!c){alert('Select a client');return}
  const period=v('fi-pe');const fee=clientFee(c);const gst=Math.round(fee*0.18);
  const tpl=TPLS.find(x=>x.id==='fee-invoice');let body=tpl?tpl.body:'';
  body=body.replace(/\[CLIENT_NAME\]/g,c.name).replace(/\[PERIOD\]/g,period).replace(/\[FEE_TYPE\]/g,c.feeType==='flat'?'Flat Advisory Fee':'AUM-based Advisory Fee ('+c.feeAmt+'%)').replace(/\[FEE_AMOUNT\]/g,fee.toLocaleString('en-IN')).replace(/\[GST_AMOUNT\]/g,gst.toLocaleString('en-IN')).replace(/\[TOTAL_AMOUNT\]/g,(fee+gst).toLocaleString('en-IN'));
  navigator.clipboard.writeText(body).then(()=>toast('Invoice copied to clipboard')).catch(()=>{toast('Generated — paste in Communication tab','info')});
  log('Generated fee invoice for '+c.name+' — '+period);closeM();
}

function loadTplM(id){const t=TPLS.find(x=>x.id===id);const el=document.getElementById('mc-bo');if(el&&t)el.value=t.body}
function fillM(){
  const cid=document.getElementById('mc-cl')?.value;const c=S.clients.find(x=>x.id==cid);const el=document.getElementById('mc-bo');if(!el)return;

function icsEscape(x){
  // RFC 5545 requires these characters to be backslash-escaped in TEXT fields (SUMMARY, DESCRIPTION, etc.)
  // Order matters: backslashes must be escaped first, before adding new backslashes for the other characters.
  return String(x||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}
function csvSafe(x){
  var s = String(x);
  // Prevents CSV/formula injection — Excel/Sheets can execute a cell as a formula if it starts with these characters
  if(/^[=+\-@]/.test(s)) s = "'" + s;
  return s;
}

// Auto-save to PC file + Email backup button
// ════════════════════════════════════════════════════════════════════════════════

let _fsHandle = null;
let _fsEnabled = false;
let _fsLastSave = null;
let _fsSaveCount = 0;
let _fsError = null;

const FS_SUPPORTS = typeof window !== 'undefined' && 'showSaveFilePicker' in window;

async function fsSetup() {
  if (!FS_SUPPORTS) {
    toast('Auto-save to PC requires Chrome 86+. Use Download Backup instead.', 'err');
    return;
  }
  try {
    _fsHandle = await window.showSaveFilePicker({
      suggestedName: _APP_LABEL + '_backup_' + TODAY + '.json',
      types: [{ description: 'AdvisorOS Backup', accept: { 'application/json': ['.json'] } }],
    });
    _fsEnabled = true; _fsError = null;
    await fsWrite();
    toast('Auto-save enabled — file updates on every change ✓');
    log('Auto-save to PC enabled: ' + _fsHandle.name);
    dpUpdateUI();
  } catch(e) {
    if (e.name !== 'AbortError') { _fsError = e.message; toast('Auto-save error: ' + e.message, 'err'); }
  }
}

async function fsWrite() {
  if (!_fsEnabled || !_fsHandle) return;
  try {
    const writable = await _fsHandle.createWritable();
    await writable.write(JSON.stringify(buildBackupPayload(), null, 2));
    await writable.close();
    _fsLastSave = new Date().toLocaleTimeString();
    _fsSaveCount++;
    _fsError = null;
    dpUpdateBadge();
  } catch(e) {
    _fsError = e.message;
    if (e.name === 'NotAllowedError') { _fsEnabled = false; _fsHandle = null; }
    dpUpdateBadge();
  }
}

const _dpOrigSave = save;
save = function() {
  _dpOrigSave();
  if (_fsEnabled) { clearTimeout(save._dpTimer); save._dpTimer = setTimeout(fsWrite, 800); }
  dpUpdateBadge();
};

function buildBackupPayload() {
  return {
    version: 3, app: _APP_LABEL, advisor: 'Manan Dua',
    exportedAt: new Date().toISOString(), exportedDate: TODAY,
    clients: S.clients||[], tasks: S.tasks||[], pipeline: S.pipeline||[],
    actLog: S.actLog||[], nextId: S.nextId||1,
  };
}

function dpDownloadBackup() {
  const json = JSON.stringify(buildBackupPayload(), null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  a.download = _APP_LABEL + '_backup_' + TODAY + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  log('Manual backup downloaded'); toast('Backup downloaded ✓');
  dpUpdateUI();
}

function dpEmailBackup(provider) {
  const data = buildBackupPayload();
  const json = JSON.stringify(data, null, 2);
  const subj = encodeURIComponent(_APP_LABEL + ' Data Backup — ' + TODAY);
  const intro = 'AdvisorOS data backup — ' + TODAY + '\n\n' +
    'Clients: ' + (data.clients.length) + ' | Tasks: ' + (data.tasks.length) + '\n\n' +
    'Backup data (paste into a .txt or .json file for safekeeping):\n\n';

  navigator.clipboard.writeText(json).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = json; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });

  const pasteNote = encodeURIComponent(intro + '[PASTE BACKUP JSON HERE — already copied to your clipboard]');

  if (provider === 'gmail') {
    window.open('https://mail.google.com/mail/u/0/?view=cm&fs=1&to=me&su=' + subj + '&body=' + pasteNote, '_blank');
  } else if (provider === 'outlook') {
    window.open('https://outlook.live.com/mail/0/deeplink/compose?subject=' + subj, '_blank');
  } else {
    window.location.href = 'mailto:?subject=' + subj + '&body=' + pasteNote;
  }
  toast('Backup JSON copied to clipboard — paste it into the email and send ✓');
  log('Email backup initiated: ' + provider);
}

function dpRestore() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.clients) { toast('Invalid backup file', 'err'); return; }
        if (!confirm('Replace ALL current data with this backup?\n\nBackup date: ' + (d.exportedDate||'unknown') + '\nClients: ' + (d.clients?.length||0) + '\n\nThis cannot be undone.')) return;
        if (d.clients)  S.clients  = d.clients;
        if (d.tasks)    S.tasks    = d.tasks;
        if (d.pipeline) S.pipeline = d.pipeline;
        if (d.actLog)   S.actLog   = d.actLog;
        S.nextId = Math.max(...(d.clients||[]).map(x=>x.id||0),...(d.tasks||[]).map(x=>x.id||0),S.nextId||1)+1;
        save(); log('Restored backup: ' + file.name); toast('Backup restored — ' + (d.clients?.length||0) + ' clients loaded ✓');
        render(); dpUpdateUI();
      } catch(err) { toast('Could not read backup: ' + err.message, 'err'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function dpUpdateBadge() {
  const el = document.getElementById('dp-badge'); if (!el) return;
  if (_fsEnabled && _fsLastSave) {
    el.textContent = '💾 Saved ' + _fsLastSave; el.style.color = 'var(--green)';

    el.textContent = '⚠ Save error'; el.style.color = 'var(--red)'; el.title = _fsError;
  } else {
    el.textContent = '○ Not saved to file'; el.style.color = 'var(--text3)';
    el.title = 'Enable auto-save to protect your data';
  }
}

// ── Field/filter toggle functions ─────────────────────────────────────────────
function ceToggleField(key, checked) {
  const p = ceLoadPrefs();
  if (checked) { if (!p.fields.includes(key)) p.fields.push(key); }
  else { p.fields = p.fields.filter(k=>k!==key); }
  ceSavePrefs(p); render();
}

function ceToggleClient(id, checked) {
  const p = ceLoadPrefs();
  if (!p.clients) p.clients = [];
  if (checked) { if (!p.clients.includes(id)) p.clients.push(id); }
  else { p.clients = p.clients.filter(x=>x!==id); }
  // If all selected, treat as "no individual filter"
  if (p.clients.length === S.clients.length) p.clients = [];
  ceSavePrefs(p); render();
}

function ceSetFilter(key, val) {
  const p = ceLoadPrefs(); p.filter[key] = val; ceSavePrefs(p); render();
}

function ceClearFilters() {
  const p = ceLoadPrefs(); p.filter = {status:'',segment:'',risk:''}; p.clients = []; ceSavePrefs(p); render();
}

function ceSelectAll() {
  const p = ceLoadPrefs();
  p.clients = p.clients && p.clients.length ? [] : S.clients.map(c=>c.id);
  ceSavePrefs(p); render();
}

function ceSelectAllFields() {
  const p = ceLoadPrefs(); p.fields = EXPORT_FIELDS.map(f=>f.k); ceSavePrefs(p); render();
}

function ceSelectEssentialFields() {
  const p = ceLoadPrefs();
  p.fields = ['name','phone','email','city','segment','risk','status','aum','sip','feeType','feeAmt','nextReview','kyc'];
  ceSavePrefs(p); render();
}

// ── Export engine ─────────────────────────────────────────────────────────────
function ceExport(format) {
  const p = ceLoadPrefs();
  const selFields = EXPORT_FIELDS.filter(f=>p.fields.includes(f.k));
  if (!selFields.length) { toast('Select at least one field to export', 'err'); return; }

  let clients = [...S.clients];
  if (p.filter.status)  clients = clients.filter(c=>c.status===p.filter.status);
  if (p.filter.segment) clients = clients.filter(c=>c.segment===p.filter.segment);
  if (p.filter.risk)    clients = clients.filter(c=>c.risk===p.filter.risk);
  if (p.clients && p.clients.length) clients = clients.filter(c=>p.clients.includes(c.id));

  if (!clients.length) { toast('No clients match the current filters', 'err'); return; }

  const headers = selFields.map(f=>f.l);
  const rows = clients.map(c=>selFields.map(f=>f.get(c)));

  if (format === 'csv') {
    const lines = [headers, ...rows].map(row =>
      row.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')
    ).join('\n');
    const blob = new Blob(['\uFEFF' + lines], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = _APP_LABEL + '_export_' + TODAY + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Exported ' + clients.length + ' clients to CSV ✓');
    log('Custom CSV export: ' + clients.length + ' clients, ' + selFields.length + ' fields');

  } else if (format === 'xlsx') {
    ceExportXLSX(headers, rows, clients.length, selFields.length);
  }
}

function ceExportXLSX(headers, rows, clientCount, fieldCount) {
  // Build a proper XLSX file using the Office Open XML format
  // We generate the XML directly — no external library needed
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // Convert column index to Excel letter (A, B, ... Z, AA, AB...)
  function colLetter(n) {
    let s = '';
    while (n >= 0) { s = String.fromCharCode(65 + (n%26)) + s; n = Math.floor(n/26) - 1; }
    return s;
  }

  // Build shared strings
  const strs = [];
  const strIdx = {};
  function si(v) {
    const s = String(v);
    if (strIdx[s] === undefined) { strIdx[s] = strs.length; strs.push(s); }
    return strIdx[s];
  }

  // Pre-index all strings
  headers.forEach(h => si(h));
  rows.forEach(row => row.forEach(v => { if (typeof v === 'string' || isNaN(Number(v))) si(v); }));

  // Build sheet XML
  const allRows = [headers, ...rows];
  let sheetXML = '<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  allRows.forEach((row, ri) => {
    sheetXML += `<row r="${ri+1}">`;
    row.forEach((v, ci) => {
      const ref = colLetter(ci) + (ri+1);
      const num = ri > 0 && typeof v === 'number';
      if (num) {
        sheetXML += `<c r="${ref}" t="n"><v>${v}</v></c>`;
      } else {
        sheetXML += `<c r="${ref}" t="s"><v>${si(v)}</v></c>`;
      }
    });
    sheetXML += '</row>';
  });
  sheetXML += '</sheetData></worksheet>';

  // Shared strings XML
  const ssXML = '<?xml version="1.0" encoding="UTF-8"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="'+strs.length+'" uniqueCount="'+strs.length+'">' +
    strs.map(s=>'<si><t xml:space="preserve">'+esc(s)+'</t></si>').join('') + '</sst>';

  // Workbook XML
  const wbXML = '<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Clients" sheetId="1" r:id="rId1"/></sheets></workbook>';

  // Relationships
  const wbRels = '<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/></Relationships>';

  const pkgRels = '<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';

  const contentTypes = '<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/></Types>';

  // Build ZIP using a minimal JS ZIP writer
  // We encode each part as UTF-8 bytes, then build a ZIP structure
  function strToU8(s) {
    return new TextEncoder().encode(s);
  }

  // Minimal ZIP builder
  function buildZip(files) {
    const parts = [];
    const dir = [];
    let offset = 0;

    files.forEach(({name, data}) => {
      const nameBytes = new TextEncoder().encode(name);
      const dataBytes = typeof data === 'string' ? strToU8(data) : data;
      const crc = crc32(dataBytes);

      // Local file header
      const lf = new Uint8Array(30 + nameBytes.length);
      const lfv = new DataView(lf.buffer);
      lfv.setUint32(0, 0x04034b50, true); // signature
      lfv.setUint16(4, 20, true);          // version needed
      lfv.setUint16(6, 0, true);           // flags
      lfv.setUint16(8, 0, true);           // compression (stored)
      lfv.setUint16(10, 0, true);          // mod time
      lfv.setUint16(12, 0, true);          // mod date
      lfv.setUint32(14, crc, true);        // CRC32
      lfv.setUint32(18, dataBytes.length, true); // compressed size
      lfv.setUint32(22, dataBytes.length, true); // uncompressed size
      lfv.setUint16(26, nameBytes.length, true);
      lfv.setUint16(28, 0, true);
      lf.set(nameBytes, 30);

      // Central directory entry
      const cd = new Uint8Array(46 + nameBytes.length);
      const cdv = new DataView(cd.buffer);
      cdv.setUint32(0, 0x02014b50, true);
      cdv.setUint16(4, 20, true);
      cdv.setUint16(6, 20, true);
      cdv.setUint16(8, 0, true);
      cdv.setUint16(10, 0, true);
      cdv.setUint16(12, 0, true);
      cdv.setUint16(14, 0, true);
      cdv.setUint32(16, crc, true);
      cdv.setUint32(20, dataBytes.length, true);
      cdv.setUint32(24, dataBytes.length, true);
      cdv.setUint16(28, nameBytes.length, true);
      cdv.setUint16(30, 0, true);
      cdv.setUint16(32, 0, true);
      cdv.setUint16(34, 0, true);
      cdv.setUint16(36, 0, true);
      cdv.setUint32(38, 0, true);
      cdv.setUint32(42, offset, true);
      cd.set(nameBytes, 46);

      dir.push(cd);
      parts.push(lf, dataBytes);
      offset += lf.length + dataBytes.length;
    });

    // End of central directory
    const cdSize = dir.reduce((a,d)=>a+d.length, 0);
    const eocd = new Uint8Array(22);
    const eocdv = new DataView(eocd.buffer);
    eocdv.setUint32(0, 0x06054b50, true);
    eocdv.setUint16(4, 0, true);
    eocdv.setUint16(6, 0, true);
    eocdv.setUint16(8, dir.length, true);
    eocdv.setUint16(10, dir.length, true);
    eocdv.setUint32(12, cdSize, true);
    eocdv.setUint32(16, offset, true);
    eocdv.setUint16(20, 0, true);

    const all = [...parts, ...dir, eocd];
    const total = all.reduce((a,b)=>a+b.length, 0);
    const out = new Uint8Array(total);
    let pos = 0;
    all.forEach(b => { out.set(b, pos); pos += b.length; });
    return out;
  }

  function crc32(buf) {
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < buf.length; i++) {
      crc ^= buf[i];
      for (let j = 0; j < 8; j++) {
        crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
      }
    }
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }

  const zipBytes = buildZip([
    { name: '[Content_Types].xml',          data: contentTypes },
    { name: '_rels/.rels',                  data: pkgRels },
    { name: 'xl/workbook.xml',              data: wbXML },
    { name: 'xl/_rels/workbook.xml.rels',   data: wbRels },
    { name: 'xl/worksheets/sheet1.xml',     data: sheetXML },
    { name: 'xl/sharedStrings.xml',         data: ssXML },
  ]);

  const blob = new Blob([zipBytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = _APP_LABEL + '_export_' + TODAY + '.xlsx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('Exported ' + clientCount + ' clients to Excel ✓');
  log('Custom Excel export: ' + clientCount + ' clients, ' + fieldCount + ' fields');
}

function dpdpaConsentGiven(c) {
  return !!(c.dpdpaConsent && c.dpdpaConsent.date);
}

function retentionExpiry(c) {
  if (c.status === 'active' || c.status === 'review') return 'Active — retain indefinitely';
  const base = c.lastContact || c.agDate || c.rpDate || TODAY;
  const d = new Date(base);
  d.setFullYear(d.getFullYear() + 5);
  return d.toISOString().slice(0,10);
}

function retentionDaysLeft(c) {
  if (c.status === 'active' || c.status === 'review') return null;
  const exp = retentionExpiry(c);
  if (exp.startsWith('Active')) return null;
  return daysTo(exp);
}

async function encryptData(plaintext, password) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['encrypt']
  );
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(plaintext));
  const out = new Uint8Array(16+12+ct.byteLength);
  out.set(salt,0); out.set(iv,16); out.set(new Uint8Array(ct),28);
  return btoa(String.fromCharCode(...out));
}

async function decryptData(b64, password) {
  const enc = new TextEncoder();
  if (!b64 || typeof b64 !== 'string') throw new Error('Invalid encrypted data'); const bytes = Uint8Array.from(atob(b64.replace(/[^A-Za-z0-9+/=]/g,'')), ch => ch.charCodeAt(0));
  const salt = bytes.slice(0,16), iv = bytes.slice(16,28), ct = bytes.slice(28);
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return new TextDecoder().decode(pt);
}

async function downloadEncryptedBackup() {
  const pwd = prompt('Set a password for this encrypted backup:\n(You must use this password to restore it)');
  if (!pwd) return;
  const pwd2 = prompt('Confirm password:');
  if (pwd !== pwd2) { toast('Passwords do not match','err'); return; }
  if (pwd.length < 6) { toast('Password must be at least 6 characters','err'); return; }
  try {
    const encrypted = await encryptData(JSON.stringify(buildBackupPayload(),null,2), pwd);
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify({encrypted:true,v:1,data:encrypted}));
    a.download = _APP_LABEL + '_ENCRYPTED_' + TODAY + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('Encrypted backup downloaded (AES-256) ✓');
    log('Encrypted backup downloaded');
  } catch(e) { toast('Encryption error: '+e.message,'err'); }
}

async function restoreEncryptedBackup() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const obj = JSON.parse(await file.text());
      if (!obj.encrypted) { dpRestore(); return; }
      const pwd = prompt('Enter password for this encrypted backup:');
      if (!pwd) return;
      const d = JSON.parse(await decryptData(obj.data, pwd));
      if (!d.clients) { toast('Invalid backup','err'); return; }
      if (!confirm('Restore from encrypted backup?\nDate: '+(d.exportedDate||'unknown')+'\nClients: '+(d.clients?.length||0))) return;
      if (d.clients) S.clients=d.clients;
      if (d.tasks) S.tasks=d.tasks;
      if (d.pipeline) S.pipeline=d.pipeline;
      if (d.actLog) S.actLog=d.actLog;
      S.nextId=Math.max(...(d.clients||[]).map(x=>x.id||0),...(d.tasks||[]).map(x=>x.id||0),S.nextId||1)+1;
      save(); toast('Restored: '+(d.clients?.length||0)+' clients loaded ✓');
      log('Encrypted backup restored from '+file.name); render();
    } catch(err) {
      toast(err.message.includes('decrypt')?'Wrong password':'Restore failed: '+err.message,'err');
    }
  };
  inp.click();
}

function archiveClient(id) {
  const c = S.clients.find(x=>x.id===id); if (!c) return;
  const exp = retentionExpiry(c);
  if (!confirm('Archive '+c.name+'?\n\nSEBI requires 5-year data retention after relationship ends.\nRetention until: '+exp)) return;
  c.status='cold'; c.archivedDate=TODAY; c.retentionExpiry=exp;
  save(); toast(c.name+' archived — retain records until '+exp);
  log('Client archived (SEBI 5yr retention): '+c.name); render();
}

function requestDataDeletion(id) {
  const c = S.clients.find(x=>x.id===id); if (!c) return;
  if (c.status==='active'||c.status==='review') { toast('Cannot delete active client — archive first','err'); return; }
  const dLeft = retentionDaysLeft(c);
  if (dLeft!==null&&dLeft>0) { toast('SEBI 5-year retention period has not expired yet. Eligible on: '+retentionExpiry(c),'err'); return; }
  if (!confirm('PERMANENTLY DELETE '+c.name+'?\n\nSEBI 5-year retention has expired.\nThis cannot be undone.')) return;
  S.actLog.unshift({ts:ts0(),msg:'DPDPA deletion: '+c.name+' (PAN: '+(c.pan||'N/A')+') — 5yr retention expired — deleted per DPDPA 2023'});
  S.clients=S.clients.filter(x=>x.id!==id);
  S.tasks=S.tasks.filter(t=>t.client!==c.name);
  save(); toast(c.name+' permanently deleted per DPDPA 2023 ✓');
  S.view=null; render();
}

function logDataBreach() {
  const desc = prompt('Describe the data breach or security incident:');
  if (!desc) return;
  S.actLog.unshift({ts:ts0(),msg:'DATA BREACH: '+desc+' — Report to SEBI/Data Protection Board within 72 hours (DPDPA 2023)'});
  save(); toast('Breach logged — notify authorities within 72 hours','err');
  log('Data breach incident logged');
}

let _commImportData = [];

function importCommissionCSV() {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.csv';
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.split('\n').filter(l=>l.trim());
      if (lines.length<2) { toast('CSV appears empty','err'); return; }
      const headers = lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
      const rows = lines.slice(1).map(line=>{
        const vals=line.split(',').map(v=>v.replace(/"/g,'').trim());
        const obj={}; headers.forEach((h,i)=>{obj[h]=vals[i]||''}); return obj;
      }).filter(r=>Object.values(r).some(v=>v));
      _commImportData=rows; S.sub.commImport='preview';
      toast(rows.length+' records loaded — review below'); log('Commission CSV loaded: '+rows.length+' rows from '+file.name); render();
    };
    reader.readAsText(file);
  };
  inp.click();
}

function confirmCommImport() {
  if (!_commImportData.length) return;
  let matched=0;
  _commImportData.forEach(row=>{
    const folio=row['Folio']||row['folio']||row['Folio No']||row['FOLIO']||'';
    const name=row['Investor Name']||row['Client Name']||row['Name']||row['INVESTOR NAME']||'';
    const comm=parseFloat(row['Commission']||row['Trail Commission']||row['Amount']||row['COMMISSION']||0);
    const month=row['Month']||row['Period']||row['MONTH']||TODAY.slice(0,7);
    const client=S.clients.find(c=>(folio&&c.folio&&c.folio===folio)||(name&&c.name&&c.name.toLowerCase()===name.toLowerCase()));
    if (client) { if (!client.commissions) client.commissions=[]; client.commissions.push({month,amount:comm,folio,source:'CSV import'}); matched++; }
  });
  save(); toast(matched+' records matched to clients ('+(  _commImportData.length-matched)+' unmatched)');
  log('Commission import: '+matched+'/'+_commImportData.length+' matched');
  _commImportData=[]; S.sub.commImport=null; render();
}

  navigator.clipboard.writeText(txt).then(()=>toast('Consent text copied ✓')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied ✓')});
}

// ── INPUT VALIDATION ─────────────────────────────────────────────────────────
function validatePAN(pan) {
  if (!pan) return true; // PAN is not mandatory on create
  return /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/.test(pan.toUpperCase());
}
function validateMobile(mobile, resStatus) {
  if (!mobile) return true;
  const digits = mobile.replace(/\D/g,'');
  if (resStatus === 'NRI') return digits.length >= 8 && digits.length <= 15;
  return digits.length === 10;
}
function validateEmail(email) {
  if (!email) return true;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
function validateClientForm(isRIA) {
  const errors = [];
  const name = v('f-n');
  const pan = v('f-pa').toUpperCase();
  const mobile = v('f-ph');
  const email = v('f-em');
  const aum = num('f-au');
  const dob = v('f-db');
  const resStatus = document.getElementById('f-rs')?.value || 'RI';

  if (!name) errors.push('Full name is required');
  if (pan && !validatePAN(pan)) errors.push('PAN must be in format AAAAA9999A (5 letters, 4 digits, 1 letter)');
  if (mobile && !validateMobile(mobile, resStatus)) {
    if (resStatus === 'NRI') errors.push('NRI mobile number must be 8-15 digits');
    else errors.push('Mobile number must be exactly 10 digits');
  }
  if (email && !validateEmail(email)) errors.push('Invalid email address format');
  if (aum < 0) errors.push('AUM cannot be negative');
  if (dob && new Date(dob) > new Date()) errors.push('Date of birth cannot be in the future');
  if (!isRIA) {
    const sip = num('f-si');
    if (sip < 0) errors.push('Monthly SIP cannot be negative');
    const sipDue = num('f-sd');
    if (sipDue && (sipDue < 1 || sipDue > 28)) errors.push('SIP due date must be between 1 and 28');
  }
  return errors;
}

function riaInsAdd() {
  const cid = document.getElementById('ri-cl')?.value;
  const c = S.clients.find(x=>x.id==cid);
  if (!c) { toast('Select a client first','err'); return; }
  const cover  = +document.getElementById('ri-cv')?.value||0;
  const prem   = +document.getElementById('ri-pr')?.value||0;
  const renew  = document.getElementById('ri-rd')?.value||'';
  const ins    = document.getElementById('ri-in')?.value||'';
  const type   = document.getElementById('ri-ty')?.value||'Term Life';
  const polno  = document.getElementById('ri-pn')?.value||'';
  if (!ins && !cover) { toast('Enter at least insurer name or cover amount','err'); return; }
  if (!c.insurance) c.insurance = [];
  c.insurance.push({ type, insurer:ins, cover, premium:prem, renewal:renew, policyNo:polno });
  save();
  toast('Insurance coverage logged for '+c.name+' ✓');
  log('Insurance logged (suitability): '+type+' · '+ins+' for '+c.name);
  // Clear fields
  ['ri-cl','ri-in','ri-cv','ri-pr','ri-pn','ri-rd'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  render();
}

function clearAllData() {
  const autoSaveWarning = _fsEnabled ? '\n\n⚠ Auto-save to PC is currently ENABLED. The PC file will also be overwritten with empty data after clearing. Disable auto-save first if you want to keep the PC file.' : '';
  if (!confirm('This will permanently delete ALL clients, tasks, and logs from this browser.'+autoSaveWarning+'\n\nThis cannot be undone. Make sure you have downloaded a backup first.')) return;
  const confirmed = prompt('Type DELETE to confirm complete data wipe:');
  if (confirmed !== 'DELETE') { toast('Cancelled — nothing deleted','info'); return; }
  // Disable auto-save before wiping so the empty state is not written to PC file
  const wasEnabled = _fsEnabled;
  _fsEnabled = false; _fsHandle = null; _fsError = null; _fsSaveCount = 0; _fsLastSave = null;
  localStorage.removeItem('ria_v2');
  S.clients=[]; S.tasks=[]; S.actLog=[]; S.nextId=1;
  S.view=null; S.modal=null; S.tab='dashboard';
  save();
  if (wasEnabled) toast('All data cleared ✓ — auto-save was disabled to protect your PC file. Re-enable it from Data Protection tab.');
  else toast('All data cleared ✓');
  render();
}

function snoozeComp(id, days) {
  if (!S.compSnooze) S.compSnooze = {};
  const until = new Date(TODAY);
  until.setDate(until.getDate() + (days||7));
  S.compSnooze[id] = until.toISOString().slice(0,10);
  save(); toast('Snoozed for '+days+' days'); log('Compliance item snoozed: '+id+' until '+S.compSnooze[id]);
  render();
}
function unsnoozeComp(id) {
  if (S.compSnooze) delete S.compSnooze[id];
  save(); toast('Snooze cleared'); render();
}
function compIsSnoozed(id) {
  if (!S.compSnooze || !S.compSnooze[id]) return false;
  return S.compSnooze[id] >= TODAY;
}
function compTaskExists(taskTitle) {
  return S.tasks.some(t => !t.done && t.title && t.title.toLowerCase().includes((taskTitle||'').toLowerCase().slice(0,20)));
}
function compGoToTask(taskTitle) {
  const t = S.tasks.find(x => !x.done && x.title && x.title.toLowerCase().includes((taskTitle||'').toLowerCase().slice(0,20)));
  if (t) { S.tab='tasks'; S.sub.taskHighlight=t.id; render(); } else { toast('No open task found','info'); }
}

function markCompDone(id) {
  const label = buildChecks().find(c=>c.id===id)?.label || id;
  const date = prompt('Enter completion date (YYYY-MM-DD) or leave blank for today:', TODAY);
  if (date === null) return; // cancelled
  const note = prompt('Optional: enter certificate number, reference, or note:', '');
  if (!S.compOverrides) S.compOverrides = {};
  S.compOverrides[id] = { date: date || TODAY, note: note || '', markedAt: TODAY };
  // Also mark any related tasks as done
  S.tasks.forEach(t => {
    if (!t.done && t.title && buildChecks().find(c=>c.id===id)?.taskTitle &&
        t.title.toLowerCase().includes((buildChecks().find(c=>c.id===id)?.taskTitle||'').toLowerCase().slice(0,20))) {
      t.done = true;
    }
  });
  save();
  toast(label + ' marked as completed ✓');
  log('Compliance item marked done: ' + label + ' on ' + (date||TODAY) + (note?' ('+note+')':''));
  render();
}
function clearCompDone(id) {
  if (!confirm('Remove the completion override for this item? It will show as pending again.')) return;
  if (S.compOverrides) delete S.compOverrides[id];
  save(); toast('Override cleared — item shows as pending again'); render();
}
